<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDNIGHT // Block Explorer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #title {
      position: absolute; top: 20px; left: 20px;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 24px;
      letter-spacing: 4px; text-transform: uppercase;
      color: #00fff2; text-shadow: 0 0 10px #00fff2, 0 0 30px #00fff266;
    }
    #title span { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 30px #ff00ff66; }
    #subtitle {
      position: absolute; top: 54px; left: 20px;
      font-size: 11px; letter-spacing: 6px; color: #00fff266; text-transform: uppercase;
    }

    #info-desc { margin-bottom: 10px; }

    #scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { Text } from 'troika-three-text';

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════

const COLORS = {
  block:     new THREE.Color(0x00fff2),
  finalized: new THREE.Color(0xffd700),
  extrinsic: new THREE.Color(0xff00ff),
  extFinal:  new THREE.Color(0xffa500),
};
const HEX = {
  block: '#00fff2', finalized: '#ffd700', extrinsic: '#ff00ff', extFinal: '#ffa500',
};

const RPC_URL = 'wss://rpc.preview.midnight.network';
const MAX_BLOCKS = 12;
const BLOCK_SPACING = 6;
const ORBITRON_URL = 'https://fonts.gstatic.com/s/orbitron/v31/yMJRMIlzdpvBhQQL_Qq7dy0.woff2';

let ws = null;
let rpcId = 0;
const rpcCallbacks = new Map();
let chainName = '';
let lastFinalizedNumber = 0;

// Block tracking: ordered newest-first
const blockList = [];
// { number, hash, extrinsics: [hex...], finalized, nodeId, extNodeIds: [...] }

let edges = [];

function rpcCall(method, params = []) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject(new Error('Not connected'));
      return;
    }
    const id = ++rpcId;
    const timer = setTimeout(() => {
      rpcCallbacks.delete(id);
      reject(new Error('Timeout'));
    }, 10000);
    rpcCallbacks.set(id, { resolve, reject, timer });
    ws.send(JSON.stringify({ jsonrpc: '2.0', id, method, params }));
  });
}

function shortHash(h) {
  if (!h) return '???';
  return h.slice(0, 10) + '...' + h.slice(-6);
}

// ═══════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.012);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 10, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

document.body.appendChild(VRButton.createButton(renderer));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = false;
controls.minDistance = 5;
controls.maxDistance = 80;
controls.target.set(-15, 0, 0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.2);
composer.addPass(bloom);

scene.add(new THREE.AmbientLight(0x111122, 0.5));
const dirLight = new THREE.DirectionalLight(0x334466, 0.3);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// VR controllers
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0);
scene.add(controller1);
const RAY_PITCH = 20 * Math.PI / 180;
const rayEnd = new THREE.Vector3(Math.sin(RAY_PITCH) * 8, 0, Math.cos(RAY_PITCH) * -8);
const rayGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), rayEnd]);
const rayMat = new THREE.LineBasicMaterial({ color: 0x00fff2, transparent: true, opacity: 0.4 });
const rayLine0 = new THREE.Line(rayGeo, rayMat);
const rayLine1 = new THREE.Line(rayGeo.clone(), rayMat.clone());
rayLine0.visible = false;
rayLine1.visible = false;
controller0.add(rayLine0);
controller1.add(rayLine1);

const pinchState = { active: false, startDist: 0, startScale: 1, startMid: new THREE.Vector3(), startGroupPos: new THREE.Vector3() };
const _c0Pos = new THREE.Vector3();
const _c1Pos = new THREE.Vector3();
const _midPos = new THREE.Vector3();

controller0.addEventListener('selectstart', () => { controller0.userData.selecting = true; });
controller0.addEventListener('selectend', () => { controller0.userData.selecting = false; });
controller1.addEventListener('selectstart', () => { controller1.userData.selecting = true; });
controller1.addEventListener('selectend', () => { controller1.userData.selecting = false; });

renderer.xr.addEventListener('sessionstart', () => {
  controls.enabled = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('scanlines').style.display = 'none';
  document.getElementById('vignette').style.display = 'none';
  rayLine0.visible = true;
  rayLine1.visible = true;
});
renderer.xr.addEventListener('sessionend', () => {
  controls.enabled = true;
  document.getElementById('hud').style.display = '';
  document.getElementById('scanlines').style.display = '';
  document.getElementById('vignette').style.display = '';
  rayLine0.visible = false;
  rayLine1.visible = false;
});

// ═══════════════════════════════════════════
// TEXTURES
// ═══════════════════════════════════════════

function makeGlowTexture() {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
}

const glowTex = makeGlowTexture();

// ═══════════════════════════════════════════
// DYNAMIC GRAPH
// ═══════════════════════════════════════════

const nodeMap = new Map();
const nodeMeshes = [];
const labelEntries = [];
const edgeData = [];
const graphGroup = new THREE.Group();
scene.add(graphGroup);
const edgeGroup = new THREE.Group();
graphGroup.add(edgeGroup);

const PARTICLES_PER_EDGE = 3;
const MAX_PARTICLES = 500 * PARTICLES_PER_EDGE;
const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
const pMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.InstancedMesh(pGeo, pMat, MAX_PARTICLES);
particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
particles.count = 0;
graphGroup.add(particles);

function addNode(id, label, color, hex, size, pos, extraData) {
  if (nodeMap.has(id)) return;
  const sz = size || 1;

  const geo = new THREE.IcosahedronGeometry(sz * 0.5, sz > 1.3 ? 1 : 0);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 1.5,
    metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  graphGroup.add(mesh);

  const glowMaterial = new THREE.SpriteMaterial({
    map: glowTex, color,
    transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMaterial);
  glow.scale.setScalar(sz * 3);
  mesh.add(glow);

  const textLabel = new Text();
  textLabel.text = label;
  textLabel.fontSize = sz > 1 ? 0.32 : 0.22;
  textLabel.color = hex;
  textLabel.anchorX = 'center';
  textLabel.anchorY = 'bottom';
  textLabel.position.y = sz * 0.5 + 0.4;
  textLabel.outlineWidth = '8%';
  textLabel.outlineColor = 0x000000;
  textLabel.outlineOpacity = 0.6;
  textLabel.depthOffset = -1;
  textLabel.font = ORBITRON_URL;
  textLabel.sync();
  mesh.add(textLabel);
  labelEntries.push({ label: textLabel, mesh });

  const entry = {
    id, label, size: sz, pos, vel: new THREE.Vector3(),
    mesh, glow, phase: Math.random() * Math.PI * 2,
    color, hex, ...extraData,
  };
  nodeMap.set(id, entry);
  nodeMeshes.push(mesh);
  mesh.userData = { nodeId: id };
}

function removeNode(id) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  graphGroup.remove(entry.mesh);
  entry.mesh.geometry.dispose();
  entry.mesh.material.dispose();
  nodeMap.delete(id);
  const mi = nodeMeshes.indexOf(entry.mesh);
  if (mi >= 0) nodeMeshes.splice(mi, 1);
  const li = labelEntries.findIndex(e => e.mesh === entry.mesh);
  if (li >= 0) labelEntries.splice(li, 1);
}

function setNodeColor(id, color, hex) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  entry.color = color;
  entry.hex = hex;
  entry.mesh.material.color.copy(color);
  entry.mesh.material.emissive.copy(color);
  entry.glow.material.color.copy(color);
  // Update label color
  const li = labelEntries.find(e => e.mesh === entry.mesh);
  if (li) li.label.color = hex;
}

function rebuildEdges() {
  for (const e of edgeData) {
    edgeGroup.remove(e.line);
    e.geo.dispose();
    e.line.material.dispose();
  }
  edgeData.length = 0;

  for (const [srcId, tgtId] of edges) {
    const src = nodeMap.get(srcId), tgt = nodeMap.get(tgtId);
    if (!src || !tgt) continue;
    const srcColor = src.color || COLORS.block;
    const tgtColor = tgt.color || COLORS.block;

    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    const colors = new Float32Array(6);
    srcColor.toArray(colors, 0);
    tgtColor.toArray(colors, 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);

    edgeData.push({
      src, tgt, line, geo,
      speed: 0.2 + Math.random() * 0.3,
      phaseOffsets: [Math.random(), Math.random(), Math.random()],
    });
  }
  particles.count = Math.min(edgeData.length * PARTICLES_PER_EDGE, MAX_PARTICLES);
}

// ═══════════════════════════════════════════
// BLOCK GRAPH MANAGEMENT
// ═══════════════════════════════════════════

function addBlock(number, hash, extrinsics) {
  // Don't add duplicates
  if (blockList.find(b => b.number === number)) return;

  const blockId = 'block-' + number;
  const extNodeIds = [];
  const extCount = extrinsics.length;
  const blockSize = 1.2 + Math.min(extCount * 0.1, 0.8);

  // Block position: newest at x=0, will be shifted
  const pos = new THREE.Vector3(0, 0, 0);
  addNode(blockId, '#' + number, COLORS.block, HEX.block, blockSize, pos, {
    type: 'block', blockNumber: number, blockHash: hash, extCount,
  });

  // Extrinsic nodes
  for (let i = 0; i < extCount; i++) {
    const extId = 'ext-' + number + '-' + i;
    const extHex = extrinsics[i];
    const extBytes = (extHex.length - 2) / 2;
    const angle = (i / extCount) * Math.PI * 2;
    const radius = 2 + Math.random();
    const extPos = new THREE.Vector3(
      radius * Math.cos(angle),
      radius * Math.sin(angle),
      (Math.random() - 0.5) * 2
    );
    addNode(extId, 'Ext ' + i, COLORS.extrinsic, HEX.extrinsic, 0.4, extPos, {
      type: 'extrinsic', extIndex: i, extBytes, extHex, blockNumber: number,
    });
    extNodeIds.push(extId);
  }

  const bd = { number, hash, extrinsics, finalized: false, nodeId: blockId, extNodeIds };
  blockList.unshift(bd);

  // Check if already finalized
  if (number <= lastFinalizedNumber) {
    bd.finalized = true;
    setNodeColor(blockId, COLORS.finalized, HEX.finalized);
    for (const eid of extNodeIds) setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
  }

  // Remove old blocks beyond window
  while (blockList.length > MAX_BLOCKS) {
    const old = blockList.pop();
    for (const eid of old.extNodeIds) removeNode(eid);
    removeNode(old.nodeId);
  }

  // Reposition all blocks along X axis
  repositionBlocks();
  rebuildAllEdges();
  forceSettleSteps = 60;
}

function repositionBlocks() {
  for (let i = 0; i < blockList.length; i++) {
    const bd = blockList[i];
    const entry = nodeMap.get(bd.nodeId);
    if (!entry) continue;
    const targetX = -i * BLOCK_SPACING;
    entry.targetX = targetX;
    // Set initial position for new nodes
    if (i === 0 && Math.abs(entry.pos.x) < 0.01 && Math.abs(entry.pos.y) < 0.01) {
      entry.pos.x = targetX;
    }
    // Position extrinsics relative to block
    for (let j = 0; j < bd.extNodeIds.length; j++) {
      const extEntry = nodeMap.get(bd.extNodeIds[j]);
      if (!extEntry) continue;
      extEntry.parentBlockId = bd.nodeId;
      // Offset extrinsic position from block
      if (extEntry.pos.length() < 3) {
        const angle = (j / bd.extNodeIds.length) * Math.PI * 2;
        const r = 2.5 + Math.random() * 0.5;
        extEntry.pos.x = targetX + r * Math.cos(angle);
        extEntry.pos.y = r * Math.sin(angle);
        extEntry.pos.z = (Math.random() - 0.5) * 2;
      }
    }
  }
}

function rebuildAllEdges() {
  edges = [];
  // Chain links between consecutive blocks
  for (let i = 0; i < blockList.length - 1; i++) {
    edges.push([blockList[i].nodeId, blockList[i + 1].nodeId]);
  }
  // Block -> extrinsic links
  for (const bd of blockList) {
    for (const eid of bd.extNodeIds) {
      edges.push([bd.nodeId, eid]);
    }
  }
  rebuildEdges();
}

function finalizeUpTo(number) {
  lastFinalizedNumber = number;
  for (const bd of blockList) {
    if (bd.number <= number && !bd.finalized) {
      bd.finalized = true;
      setNodeColor(bd.nodeId, COLORS.finalized, HEX.finalized);
      for (const eid of bd.extNodeIds) {
        setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
      }
    }
  }
  updateSubtitle();
}

function updateSubtitle() {
  const newest = blockList.length > 0 ? blockList[0].number : '?';
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = chainName +
    ' // best: #' + newest +
    ' // finalized: #' + lastFinalizedNumber;
}

// ═══════════════════════════════════════════
// ENVIRONMENT
// ═══════════════════════════════════════════

const grid = new THREE.GridHelper(120, 120, 0x00fff2, 0x00fff2);
grid.material.opacity = 0.06;
grid.material.transparent = true;
grid.material.depthWrite = false;
grid.position.y = -12;
scene.add(grid);

const grid2 = new THREE.GridHelper(120, 30, 0xff00ff, 0xff00ff);
grid2.material.opacity = 0.03;
grid2.material.transparent = true;
grid2.material.depthWrite = false;
grid2.position.y = -12.01;
scene.add(grid2);

function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = radius * (0.3 + Math.random() * 0.7);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return geo;
}

const stars1 = new THREE.Points(makeStars(1500, 80),
  new THREE.PointsMaterial({ color: 0x00fff2, size: 0.15, transparent: true, opacity: 0.4, depthWrite: false })
);
const stars2 = new THREE.Points(makeStars(800, 90),
  new THREE.PointsMaterial({ color: 0xff00ff, size: 0.1, transparent: true, opacity: 0.25, depthWrite: false })
);
scene.add(stars1, stars2);

// ═══════════════════════════════════════════
// FORCE LAYOUT
// ═══════════════════════════════════════════

let forceSettleSteps = 0;
const repulsion = 25, attraction = 0.06, damping = 0.85, minDist = 0.5;
const _diff = new THREE.Vector3();

function forceStep() {
  const allNodes = [...nodeMap.values()];

  // Repulsion between all nodes
  for (let i = 0; i < allNodes.length; i++) {
    for (let j = i + 1; j < allNodes.length; j++) {
      const a = allNodes[i], b = allNodes[j];
      _diff.subVectors(a.pos, b.pos);
      const d = Math.max(_diff.length(), minDist);
      const f = repulsion / (d * d);
      _diff.normalize().multiplyScalar(f);
      a.vel.add(_diff);
      b.vel.sub(_diff);
    }
  }

  // Attraction along edges
  for (const [srcId, tgtId] of edges) {
    const s = nodeMap.get(srcId), t = nodeMap.get(tgtId);
    if (!s || !t) continue;
    _diff.subVectors(t.pos, s.pos);
    const d = _diff.length();
    const rest = s.type === 'block' && t.type === 'block' ? BLOCK_SPACING : 2.5;
    const f = attraction * (d - rest);
    _diff.normalize().multiplyScalar(f);
    s.vel.add(_diff);
    t.vel.sub(_diff);
  }

  // Block positioning force: pull blocks toward their target X, center Y/Z
  for (const n of allNodes) {
    if (n.targetX !== undefined) {
      n.vel.x += (n.targetX - n.pos.x) * 0.15;
      n.vel.y += (0 - n.pos.y) * 0.03;
      n.vel.z += (0 - n.pos.z) * 0.03;
    }
    n.vel.multiplyScalar(damping);
    n.pos.add(n.vel);
  }
}

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-999, -999);
let hoveredNode = null;
let selectedNode = null;
let gazeTarget = null;
let gazeStart = 0;
const GAZE_DWELL_MS = 1500;

const infoPanel = document.getElementById('info-panel');
const infoTitle = document.getElementById('info-title');
const infoLayer = document.getElementById('info-layer');
const infoDesc  = document.getElementById('info-desc');
const infoConns = document.getElementById('info-connections');

const vrInfoText = new Text();
vrInfoText.fontSize = 0.18;
vrInfoText.color = '#00fff2';
vrInfoText.anchorX = 'left';
vrInfoText.anchorY = 'top';
vrInfoText.maxWidth = 3;
vrInfoText.outlineWidth = '6%';
vrInfoText.outlineColor = 0x000000;
vrInfoText.outlineOpacity = 0.8;
vrInfoText.depthOffset = -1;
vrInfoText.font = ORBITRON_URL;
vrInfoText.visible = false;
scene.add(vrInfoText);

function showInfo(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  const hex = n.hex || '#00fff2';

  let title = '', layerName = '', desc = '';

  if (n.type === 'block') {
    const bd = blockList.find(b => b.nodeId === nodeId);
    title = 'Block #' + n.blockNumber;
    layerName = bd && bd.finalized ? 'Finalized' : 'Unfinalized';
    desc = 'Hash: ' + shortHash(n.blockHash) +
      '\nExtrinsics: ' + n.extCount +
      '\nStatus: ' + layerName;
  } else if (n.type === 'extrinsic') {
    title = 'Extrinsic ' + n.extIndex;
    layerName = 'Block #' + n.blockNumber;
    desc = 'Size: ' + n.extBytes + ' bytes' +
      '\nData: ' + (n.extHex ? n.extHex.slice(0, 40) + '...' : '?');
  }

  infoTitle.textContent = title;
  infoTitle.style.color = hex;
  infoLayer.textContent = layerName;
  infoLayer.style.color = hex;
  infoDesc.textContent = desc;
  infoConns.textContent = '';
  infoPanel.style.display = 'block';
  infoPanel.style.borderColor = hex + '44';

  if (renderer.xr.isPresenting) {
    vrInfoText.text = title + '\n' + layerName + '\n\n' + desc;
    vrInfoText.color = hex;
    vrInfoText.visible = true;
    vrInfoText.sync();
  }
}

function hideInfo() {
  infoPanel.style.display = 'none';
  vrInfoText.visible = false;
}

function highlightNode(nodeId) {
  if (hoveredNode === nodeId) {
    if (nodeId && nodeId !== selectedNode && gazeTarget === nodeId) {
      if (performance.now() - gazeStart >= GAZE_DWELL_MS) {
        selectedNode = nodeId;
        showInfo(nodeId);
      }
    }
    return;
  }
  if (hoveredNode) {
    const prev = nodeMap.get(hoveredNode);
    if (prev) {
      prev.mesh.material.emissiveIntensity = 1.5;
      prev.glow.material.opacity = 0.6;
    }
  }
  hoveredNode = nodeId;
  gazeTarget = nodeId;
  gazeStart = performance.now();
  if (nodeId) {
    const n = nodeMap.get(nodeId);
    n.mesh.material.emissiveIntensity = 3.0;
    n.glow.material.opacity = 1.0;
    showInfo(nodeId);
  } else if (!selectedNode) {
    hideInfo();
  }
}

window.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
});

window.addEventListener('click', () => {
  if (hoveredNode) {
    selectedNode = selectedNode === hoveredNode ? null : hoveredNode;
    if (!selectedNode) hideInfo();
  } else {
    selectedNode = null;
    hideInfo();
  }
});

function vrSelectNode(wasTwoHand) {
  if (wasTwoHand) return;
  if (hoveredNode) {
    if (selectedNode === hoveredNode) {
      selectedNode = null;
      hideInfo();
    } else {
      selectedNode = hoveredNode;
      showInfo(hoveredNode);
    }
  } else {
    selectedNode = null;
    hideInfo();
  }
}
controller0.addEventListener('selectend', () => { vrSelectNode(pinchState.active); });
controller1.addEventListener('selectend', () => { vrSelectNode(pinchState.active); });

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════

const clock = new THREE.Clock();
const dummy = new THREE.Object3D();
const _camQuat = new THREE.Quaternion();
const _parentQuat = new THREE.Quaternion();

function animate() {
  const t = clock.getElapsedTime();

  if (forceSettleSteps > 0) {
    forceStep();
    forceSettleSteps--;
  }

  for (const n of nodeMap.values()) {
    n.mesh.position.copy(n.pos);
    n.mesh.position.y += Math.sin(t * 0.5 + n.phase) * 0.1;
    n.mesh.rotation.y = t * 0.2 + n.phase;
    n.mesh.rotation.x = Math.sin(t * 0.3 + n.phase) * 0.1;
    n.glow.material.opacity = 0.5 + 0.15 * Math.sin(t * 1.5 + n.phase);
  }

  camera.getWorldQuaternion(_camQuat);
  for (const { label, mesh } of labelEntries) {
    mesh.getWorldQuaternion(_parentQuat).invert();
    label.quaternion.copy(_camQuat).premultiply(_parentQuat);
  }

  for (const e of edgeData) {
    const pa = e.geo.attributes.position.array;
    const sp = e.src.mesh.position, tp = e.tgt.mesh.position;
    pa[0] = sp.x; pa[1] = sp.y; pa[2] = sp.z;
    pa[3] = tp.x; pa[4] = tp.y; pa[5] = tp.z;
    e.geo.attributes.position.needsUpdate = true;
    e.line.material.opacity = 0.25 + 0.1 * Math.sin(t * 2 + e.phaseOffsets[0] * 10);
  }

  let idx = 0;
  const _a = new THREE.Vector3(), _b = new THREE.Vector3();
  for (const e of edgeData) {
    _a.copy(e.src.mesh.position);
    _b.copy(e.tgt.mesh.position);
    for (let p = 0; p < PARTICLES_PER_EDGE; p++) {
      if (idx >= MAX_PARTICLES) break;
      const phase = ((t * e.speed + e.phaseOffsets[p]) % 1 + 1) % 1;
      dummy.position.lerpVectors(_a, _b, phase);
      dummy.scale.setScalar(0.4 + 0.6 * Math.sin(phase * Math.PI));
      dummy.updateMatrix();
      particles.setMatrixAt(idx, dummy.matrix);
      idx++;
    }
  }
  particles.instanceMatrix.needsUpdate = true;

  stars1.rotation.y = t * 0.005;
  stars2.rotation.y = -t * 0.003;
  grid.position.z = (t * 0.5) % 1;

  if (!renderer.xr.isPresenting) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(nodeMeshes, false);
    if (hits.length > 0) {
      highlightNode(hits[0].object.userData.nodeId);
      document.body.style.cursor = 'pointer';
    } else {
      if (!selectedNode) highlightNode(null);
      document.body.style.cursor = 'default';
    }
    controls.update();
    composer.render();
  } else {
    const session = renderer.xr.getSession();
    const sources = session ? session.inputSources : [];
    const selectingSources = [];
    for (const src of sources) {
      if (src.gamepad && src.gamepad.buttons.length > 0 && src.gamepad.buttons[0].pressed) {
        selectingSources.push(src);
      }
    }
    const twoHands = selectingSources.length >= 2 ||
      (controller0.userData.selecting && controller1.userData.selecting);
    if (twoHands) {
      controller0.getWorldPosition(_c0Pos);
      controller1.getWorldPosition(_c1Pos);
      if (!pinchState.active) {
        pinchState.startDist = _c0Pos.distanceTo(_c1Pos);
        pinchState.startScale = graphGroup.scale.x;
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        pinchState.startMid.copy(_midPos);
        pinchState.startGroupPos.copy(graphGroup.position);
        pinchState.active = pinchState.startDist > 0.01;
      } else {
        const curDist = _c0Pos.distanceTo(_c1Pos);
        const scale = Math.min(Math.max(pinchState.startScale * (curDist / pinchState.startDist), 0.2), 5);
        graphGroup.scale.setScalar(scale);
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        graphGroup.position.copy(pinchState.startGroupPos).add(
          _midPos.clone().sub(pinchState.startMid)
        );
      }
    } else {
      pinchState.active = false;
    }

    const tempMatrix = new THREE.Matrix4();
    const rayDir = new THREE.Vector3(Math.sin(RAY_PITCH), 0, -Math.cos(RAY_PITCH));
    let bestHit = null;
    for (const ctrl of [controller0, controller1]) {
      tempMatrix.identity().extractRotation(ctrl.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
      raycaster.ray.direction.copy(rayDir).applyMatrix4(tempMatrix);
      const hits = raycaster.intersectObjects(nodeMeshes, false);
      if (hits.length > 0 && (!bestHit || hits[0].distance < bestHit.distance)) {
        bestHit = hits[0];
      }
    }
    if (bestHit) {
      highlightNode(bestHit.object.userData.nodeId);
    } else {
      if (!selectedNode) highlightNode(null);
    }
    if (vrInfoText.visible && selectedNode) {
      const sn = nodeMap.get(selectedNode);
      if (sn) {
        sn.mesh.getWorldPosition(vrInfoText.position);
        vrInfoText.position.x += sn.size * 0.5 + 0.4;
        vrInfoText.position.y += sn.size * 0.3;
        vrInfoText.quaternion.copy(camera.quaternion);
      }
    }
    renderer.render(scene, camera);
  }
}

renderer.setAnimationLoop(animate);

// ═══════════════════════════════════════════
// RPC CONNECTION
// ═══════════════════════════════════════════

function connectRpc() {
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = 'Connecting...';

  ws = new WebSocket(RPC_URL);
  ws.onopen = async () => {
    subtitle.textContent = 'Connected, subscribing...';
    try {
      chainName = await rpcCall('system_chain');

      // Subscribe to new (unfinalized) heads
      await rpcCall('chain_subscribeNewHeads');

      // Subscribe to finalized heads
      await rpcCall('chain_subscribeFinalizedHeads');

      subtitle.textContent = chainName + ' // waiting for blocks...';
    } catch (e) {
      console.error('Setup error:', e);
      subtitle.textContent = 'Error: ' + e.message;
    }
  };

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    // RPC response
    if (msg.id != null && rpcCallbacks.has(msg.id)) {
      const cb = rpcCallbacks.get(msg.id);
      clearTimeout(cb.timer);
      rpcCallbacks.delete(msg.id);
      if (msg.error) cb.reject(msg.error);
      else cb.resolve(msg.result);
      return;
    }

    // Subscription notifications
    if (msg.params && msg.params.result) {
      const header = msg.params.result;
      const number = parseInt(header.number, 16);

      if (msg.method === 'chain_newHead') {
        try {
          const hash = await rpcCall('chain_getBlockHash', [number]);
          const block = await rpcCall('chain_getBlock', [hash]);
          addBlock(number, hash, block.block.extrinsics);
          updateSubtitle();
        } catch (e) {
          console.error('Failed to fetch block', number, e);
        }
      } else if (msg.method === 'chain_finalizedHead') {
        finalizeUpTo(number);
      }
    }
  };

  ws.onerror = () => {
    subtitle.textContent = 'Connection error, retrying...';
  };
  ws.onclose = () => {
    setTimeout(connectRpc, 5000);
  };
}

connectRpc();

// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>

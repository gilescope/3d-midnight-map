<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDNIGHT // P2P Network</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;

    #title {
      position: absolute; top: 20px; left: 20px;

      color: #00fff2; text-shadow: 0 0 10px #00fff2, 0 0 30px #00fff266;

    #subtitle {
      position: absolute; top: 54px; left: 20px;
      font-size: 11px; letter-spacing: 6px; color: #00fff266; text-transform: uppercase;
    }

      position: absolute; bottom: 20px; left: 20px; font-size: 12px; line-height: 22px;

    .legend-item { display: flex; align-items: center; gap: 8px; opacity: 0.7; }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;

    }

      position: absolute; top: 50%; right: 30px; transform: translateY(-50%);

      line-height: 1.6;
    }

      font-family: 'Orbitron', sans-serif; font-size: 14px;
      margin-bottom: 8px; letter-spacing: 2px;

    #info-desc { margin-bottom: 10px; }
    #info-connections { opacity: 0.5; font-size: 11px; }

    #scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);

<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { Text } from 'troika-three-text';

// ═══════════════════════════════════════════
// NETWORK DATA
// ═══════════════════════════════════════════

const LAYERS = {
  local: { color: new THREE.Color(0x00fff2), hex: '#00fff2', name: 'Local Node' },
  peer:  { color: new THREE.Color(0x00ff88), hex: '#00ff88', name: 'Peer' },
};

function shortId(peerId) {
  if (!peerId) return '???';
  return peerId.slice(0, 8) + '...' + peerId.slice(-4);
}

const RPC_URL = 'wss://rpc.preview.midnight.network';
let ws = null;
let rpcId = 0;
const rpcCallbacks = new Map();
let localPeerId = null;
let chainName = '';
let nodeName = '';
let nodeVersion = '';
let edges = [];

function rpcCall(method, params = []) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject(new Error('Not connected'));
      return;
    }
    const id = ++rpcId;
    const timer = setTimeout(() => {
      rpcCallbacks.delete(id);
      reject(new Error('Timeout'));
    }, 10000);
    rpcCallbacks.set(id, { resolve, reject, timer });
    ws.send(JSON.stringify({ jsonrpc: '2.0', id, method, params }));
  });
}

// ═══════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.018);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 8, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// VR button
document.body.appendChild(VRButton.createButton(renderer));

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.target.set(0, 0, 0);

// Post-processing (bloom for non-VR)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.2);
composer.addPass(bloom);

// Lights
scene.add(new THREE.AmbientLight(0x111122, 0.5));
const dirLight = new THREE.DirectionalLight(0x334466, 0.3);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// VR controllers
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0);
scene.add(controller1);
// Pitch ray down to match natural hand angle on visionOS (+X = down in controller space)
const RAY_PITCH = 20 * Math.PI / 180;
const rayEnd = new THREE.Vector3(Math.sin(RAY_PITCH) * 8, 0, Math.cos(RAY_PITCH) * -8);
const rayGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 0, 0), rayEnd
]);
const rayMat = new THREE.LineBasicMaterial({ color: 0x00fff2, transparent: true, opacity: 0.4 });
const rayLine0 = new THREE.Line(rayGeo, rayMat);
const rayLine1 = new THREE.Line(rayGeo.clone(), rayMat.clone());
rayLine0.visible = false;
rayLine1.visible = false;
controller0.add(rayLine0);
controller1.add(rayLine1);

// Two-handed pinch-to-zoom state (driven by XR input sources each frame)
const pinchState = { active: false, startDist: 0, startScale: 1, startMid: new THREE.Vector3(), startGroupPos: new THREE.Vector3() };
const _c0Pos = new THREE.Vector3();
const _c1Pos = new THREE.Vector3();
const _midPos = new THREE.Vector3();

controller0.addEventListener('selectstart', () => { controller0.userData.selecting = true; });
controller0.addEventListener('selectend', () => { controller0.userData.selecting = false; });
controller1.addEventListener('selectstart', () => { controller1.userData.selecting = true; });
controller1.addEventListener('selectend', () => { controller1.userData.selecting = false; });

renderer.xr.addEventListener('sessionstart', () => {
  controls.enabled = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('scanlines').style.display = 'none';
  document.getElementById('vignette').style.display = 'none';
  rayLine0.visible = true;
  rayLine1.visible = true;
});
renderer.xr.addEventListener('sessionend', () => {
  controls.enabled = true;
  document.getElementById('hud').style.display = '';
  document.getElementById('scanlines').style.display = '';
  document.getElementById('vignette').style.display = '';
  rayLine0.visible = false;
  rayLine1.visible = false;
});

// ═══════════════════════════════════════════
// TEXTURES
// ═══════════════════════════════════════════

function makeGlowTexture() {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
}

const glowTex = makeGlowTexture();
const ORBITRON_URL = 'https://fonts.gstatic.com/s/orbitron/v31/yMJRMIlzdpvBhQQL_Qq7dy0.woff2';

// ═══════════════════════════════════════════
// DYNAMIC GRAPH
// ═══════════════════════════════════════════

const nodeMap = new Map();
const nodeMeshes = [];
const labelEntries = [];
const edgeData = [];
const graphGroup = new THREE.Group();
scene.add(graphGroup);
const edgeGroup = new THREE.Group();
graphGroup.add(edgeGroup);

// Particles: pre-allocate for up to 300 edges
const PARTICLES_PER_EDGE = 3;
const MAX_PARTICLES = 300 * PARTICLES_PER_EDGE;
const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
const pMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.InstancedMesh(pGeo, pMat, MAX_PARTICLES);
particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
particles.count = 0;
graphGroup.add(particles);

// Saved positions across updates (peer ID -> Vector3)
const savedPositions = new Map();

function addNode(id, label, layer, size, extraData) {
  if (nodeMap.has(id)) return;
  const layerDef = LAYERS[layer] || LAYERS.unknown;
  const sz = size || 1;

  const saved = savedPositions.get(id);
  const pos = saved ? saved.clone() : new THREE.Vector3(
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 12
  );

  const geo = new THREE.IcosahedronGeometry(sz * 0.5, sz > 1.3 ? 1 : 0);
  const mat = new THREE.MeshStandardMaterial({
    color: layerDef.color, emissive: layerDef.color, emissiveIntensity: 1.5,
    metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  graphGroup.add(mesh);

  const glowMaterial = new THREE.SpriteMaterial({
    map: glowTex, color: layerDef.color,
    transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMaterial);
  glow.scale.setScalar(sz * 3);
  mesh.add(glow);

  const textLabel = new Text();
  textLabel.text = label;
  textLabel.fontSize = 0.28;
  textLabel.color = layerDef.hex;
  textLabel.anchorX = 'center';
  textLabel.anchorY = 'bottom';
  textLabel.position.y = sz * 0.5 + 0.5;
  textLabel.outlineWidth = '8%';
  textLabel.outlineColor = 0x000000;
  textLabel.outlineOpacity = 0.6;
  textLabel.depthOffset = -1;
  textLabel.font = ORBITRON_URL;
  textLabel.sync();
  mesh.add(textLabel);
  labelEntries.push({ label: textLabel, mesh });

  const entry = {
    id, label, layer, size: sz, pos, vel: new THREE.Vector3(),
    mesh, glow, phase: Math.random() * Math.PI * 2,
    ...extraData,
  };
  nodeMap.set(id, entry);
  nodeMeshes.push(mesh);
  mesh.userData = { nodeId: id };
}

function removeNode(id) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  savedPositions.set(id, entry.pos.clone());
  graphGroup.remove(entry.mesh);
  entry.mesh.geometry.dispose();
  entry.mesh.material.dispose();
  nodeMap.delete(id);
  const mi = nodeMeshes.indexOf(entry.mesh);
  if (mi >= 0) nodeMeshes.splice(mi, 1);
  const li = labelEntries.findIndex(e => e.mesh === entry.mesh);
  if (li >= 0) labelEntries.splice(li, 1);
}

function rebuildEdges() {
  // Clear old edges
  for (const e of edgeData) {
    edgeGroup.remove(e.line);
    e.geo.dispose();
    e.line.material.dispose();
  }
  edgeData.length = 0;

  for (const [srcId, tgtId] of edges) {
    const src = nodeMap.get(srcId), tgt = nodeMap.get(tgtId);
    if (!src || !tgt) continue;
    const srcColor = (LAYERS[src.layer] || LAYERS.unknown).color;
    const tgtColor = (LAYERS[tgt.layer] || LAYERS.unknown).color;

    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    const colors = new Float32Array(6);
    srcColor.toArray(colors, 0);
    tgtColor.toArray(colors, 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);

    edgeData.push({
      src, tgt, line, geo,
      speed: 0.2 + Math.random() * 0.3,
      phaseOffsets: [Math.random(), Math.random(), Math.random()],
    });
  }
  particles.count = Math.min(edgeData.length * PARTICLES_PER_EDGE, MAX_PARTICLES);
}

function updateGraph(localId, health, syncState) {
  const peerCount = health.peers || 0;
  const block = syncState ? syncState.currentBlock : '?';
  const highest = syncState ? syncState.highestBlock : '?';
  const syncing = health.isSyncing ? ' (syncing)' : '';
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = chainName + ' v' + nodeVersion + ' // ' + peerCount + ' peers // block #' + block + syncing;

  // Build wanted peer IDs (peer-0, peer-1, ...)
  const wantedIds = new Set([localId]);
  for (let i = 0; i < peerCount; i++) wantedIds.add('peer-' + i);

  // Remove stale nodes
  for (const id of [...nodeMap.keys()]) {
    if (!wantedIds.has(id)) removeNode(id);
  }

  // Add/update local node
  addNode(localId, nodeName || 'LOCAL NODE', 'local', 1.8, {
    block, highest, syncing: health.isSyncing, version: nodeVersion,
  });
  const localEntry = nodeMap.get(localId);
  if (localEntry) {
    localEntry.block = block;
    localEntry.highest = highest;
    localEntry.syncing = health.isSyncing;
  }

  // Add anonymous peer nodes
  for (let i = 0; i < peerCount; i++) {
    const peerId = 'peer-' + i;
    addNode(peerId, 'Peer ' + (i + 1), 'peer', 0.8);
  }

  // Edges: local -> each peer
  edges = [];
  for (let i = 0; i < peerCount; i++) edges.push([localId, 'peer-' + i]);
  rebuildEdges();

  // Re-settle force layout
  forceSettleSteps = 100;
}

// ═══════════════════════════════════════════
// ENVIRONMENT
// ═══════════════════════════════════════════

const grid = new THREE.GridHelper(80, 80, 0x00fff2, 0x00fff2);
grid.material.opacity = 0.06;
grid.material.transparent = true;
grid.material.depthWrite = false;
grid.position.y = -12;
scene.add(grid);

const grid2 = new THREE.GridHelper(80, 20, 0xff00ff, 0xff00ff);
grid2.material.opacity = 0.03;
grid2.material.transparent = true;
grid2.material.depthWrite = false;
grid2.position.y = -12.01;
scene.add(grid2);

function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = radius * (0.3 + Math.random() * 0.7);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return geo;
}

const stars1 = new THREE.Points(makeStars(1500, 80),
  new THREE.PointsMaterial({ color: 0x00fff2, size: 0.15, transparent: true, opacity: 0.4, depthWrite: false })
);
const stars2 = new THREE.Points(makeStars(800, 90),
  new THREE.PointsMaterial({ color: 0xff00ff, size: 0.1, transparent: true, opacity: 0.25, depthWrite: false })
);
scene.add(stars1, stars2);

// ═══════════════════════════════════════════
// FORCE LAYOUT
// ═══════════════════════════════════════════

let forceSettleSteps = 0;
const repulsion = 40, attraction = 0.04, centering = 0.008, damping = 0.85, minDist = 0.5;
const _diff = new THREE.Vector3();

function forceStep() {
  const allNodes = [...nodeMap.values()];
  // Repulsion
  for (let i = 0; i < allNodes.length; i++) {
    for (let j = i + 1; j < allNodes.length; j++) {
      const a = allNodes[i], b = allNodes[j];
      _diff.subVectors(a.pos, b.pos);
      const d = Math.max(_diff.length(), minDist);
      const f = repulsion / (d * d);
      _diff.normalize().multiplyScalar(f);
      a.vel.add(_diff);
      b.vel.sub(_diff);
    }
  }
  // Attraction along edges
  for (const [srcId, tgtId] of edges) {
    const s = nodeMap.get(srcId), t = nodeMap.get(tgtId);
    if (!s || !t) continue;
    _diff.subVectors(t.pos, s.pos);
    const d = _diff.length();
    const f = attraction * (d - 4);
    _diff.normalize().multiplyScalar(f);
    s.vel.add(_diff);
    t.vel.sub(_diff);
  }
  // Centering
  for (const n of allNodes) {
    n.vel.add(_diff.copy(n.pos).negate().multiplyScalar(centering));
    n.vel.multiplyScalar(damping);
    n.pos.add(n.vel);
  }
}

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-999, -999);
let hoveredNode = null;
let selectedNode = null;
let gazeTarget = null;
let gazeStart = 0;
const GAZE_DWELL_MS = 1500;

const infoPanel = document.getElementById('info-panel');
const infoTitle = document.getElementById('info-title');
const infoLayer = document.getElementById('info-layer');
const infoDesc  = document.getElementById('info-desc');
const infoConns = document.getElementById('info-connections');

// VR 3D info panel (troika text attached to scene)
const vrInfoText = new Text();
vrInfoText.fontSize = 0.18;
vrInfoText.color = '#00fff2';
vrInfoText.anchorX = 'left';
vrInfoText.anchorY = 'top';
vrInfoText.maxWidth = 3;
vrInfoText.outlineWidth = '6%';
vrInfoText.outlineColor = 0x000000;
vrInfoText.outlineOpacity = 0.8;
vrInfoText.depthOffset = -1;
vrInfoText.font = ORBITRON_URL;
vrInfoText.visible = false;
scene.add(vrInfoText);

function showInfo(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  const layer = LAYERS[n.layer] || LAYERS.unknown;

  // Build description
  const lines = [];
  if (n.id === localPeerId) {
    lines.push('Peer ID: ' + shortId(n.id));
    lines.push('Block: #' + (n.block || '?') + ' / #' + (n.highest || '?'));
    if (n.syncing) lines.push('Status: Syncing...');
    if (n.version) lines.push('Version: ' + n.version);
  } else {
    lines.push('Connected peer');
  }
  const desc = lines.join('\n');

  // HTML panel (non-VR)
  infoTitle.textContent = n.label;
  infoTitle.style.color = layer.hex;
  infoLayer.textContent = layer.name;
  infoLayer.style.color = layer.hex;
  infoDesc.textContent = desc;
  infoConns.textContent = '';
  infoPanel.style.display = 'block';
  infoPanel.style.borderColor = layer.hex + '44';

  // VR 3D panel
  if (renderer.xr.isPresenting) {
    vrInfoText.text = n.label + '\n' + layer.name + '\n\n' + desc;
    vrInfoText.color = layer.hex;
    vrInfoText.visible = true;
    vrInfoText.sync();
  }
}

function hideInfo() {
  infoPanel.style.display = 'none';
  vrInfoText.visible = false;
}

function highlightNode(nodeId) {
  if (hoveredNode === nodeId) {
    if (nodeId && nodeId !== selectedNode && gazeTarget === nodeId) {
      if (performance.now() - gazeStart >= GAZE_DWELL_MS) {
        selectedNode = nodeId;
        showInfo(nodeId);
      }
    }
    return;
  }
  if (hoveredNode) {
    const prev = nodeMap.get(hoveredNode);
    if (prev) {
      prev.mesh.material.emissiveIntensity = 1.5;
      prev.glow.material.opacity = 0.6;
    }
  }
  hoveredNode = nodeId;
  gazeTarget = nodeId;
  gazeStart = performance.now();
  if (nodeId) {
    const n = nodeMap.get(nodeId);
    n.mesh.material.emissiveIntensity = 3.0;
    n.glow.material.opacity = 1.0;
    showInfo(nodeId);
  } else if (!selectedNode) {
    hideInfo();
  }
}

window.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
});

window.addEventListener('click', () => {
  if (hoveredNode) {
    selectedNode = selectedNode === hoveredNode ? null : hoveredNode;
    if (!selectedNode) hideInfo();
  } else {
    selectedNode = null;
    hideInfo();
  }
});

// VR node selection on pinch release (skip if two-hand zoom)
function vrSelectNode(wasTwoHand) {
  if (wasTwoHand) return;
  if (hoveredNode) {
    if (selectedNode === hoveredNode) {
      selectedNode = null;
      hideInfo();
    } else {
      selectedNode = hoveredNode;
      showInfo(hoveredNode);
    }
  } else {
    selectedNode = null;
    hideInfo();
  }
}
controller0.addEventListener('selectend', () => {
  vrSelectNode(pinchState.active);
});
controller1.addEventListener('selectend', () => {
  vrSelectNode(pinchState.active);
});

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════

const clock = new THREE.Clock();
const dummy = new THREE.Object3D();
const _camQuat = new THREE.Quaternion();
const _parentQuat = new THREE.Quaternion();

function animate() {
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  // Force simulation (settle after graph updates)
  if (forceSettleSteps > 0) {
    forceStep();
    forceSettleSteps--;
  }

  // Update node positions + floating bob
  for (const n of nodeMap.values()) {
    n.mesh.position.copy(n.pos);
    n.mesh.position.y += Math.sin(t * 0.5 + n.phase) * 0.15;
    n.mesh.rotation.y = t * 0.2 + n.phase;
    n.mesh.rotation.x = Math.sin(t * 0.3 + n.phase) * 0.1;
    n.glow.material.opacity = 0.5 + 0.15 * Math.sin(t * 1.5 + n.phase);
  }

  // Billboard labels to face camera
  camera.getWorldQuaternion(_camQuat);
  for (const { label, mesh } of labelEntries) {
    mesh.getWorldQuaternion(_parentQuat).invert();
    label.quaternion.copy(_camQuat).premultiply(_parentQuat);
  }

  // Update edge lines
  for (const e of edgeData) {
    const pa = e.geo.attributes.position.array;
    const sp = e.src.mesh.position, tp = e.tgt.mesh.position;
    pa[0] = sp.x; pa[1] = sp.y; pa[2] = sp.z;
    pa[3] = tp.x; pa[4] = tp.y; pa[5] = tp.z;
    e.geo.attributes.position.needsUpdate = true;
    e.line.material.opacity = 0.25 + 0.1 * Math.sin(t * 2 + e.phaseOffsets[0] * 10);
  }

  // Update edge particles
  let idx = 0;
  const _a = new THREE.Vector3(), _b = new THREE.Vector3();
  for (const e of edgeData) {
    _a.copy(e.src.mesh.position);
    _b.copy(e.tgt.mesh.position);
    for (let p = 0; p < PARTICLES_PER_EDGE; p++) {
      if (idx >= MAX_PARTICLES) break;
      const phase = ((t * e.speed + e.phaseOffsets[p]) % 1 + 1) % 1;
      dummy.position.lerpVectors(_a, _b, phase);
      const fadeEdge = Math.sin(phase * Math.PI);
      dummy.scale.setScalar(0.4 + 0.6 * fadeEdge);
      dummy.updateMatrix();
      particles.setMatrixAt(idx, dummy.matrix);
      idx++;
    }
  }
  particles.instanceMatrix.needsUpdate = true;

  // Rotate stars slowly
  stars1.rotation.y = t * 0.005;
  stars2.rotation.y = -t * 0.003;

  // Move grid for travel effect
  grid.position.z = (t * 0.5) % 1;

  // Raycasting (non-VR)
  if (!renderer.xr.isPresenting) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(nodeMeshes, false);
    if (hits.length > 0) {
      highlightNode(hits[0].object.userData.nodeId);
      document.body.style.cursor = 'pointer';
    } else {
      if (!selectedNode) highlightNode(null);
      document.body.style.cursor = 'default';
    }
    controls.update();
    composer.render();
  } else {
    // Two-handed pinch-to-zoom + drag
    const session = renderer.xr.getSession();
    const sources = session ? session.inputSources : [];
    const selectingSources = [];
    for (const src of sources) {
      if (src.gamepad && src.gamepad.buttons.length > 0 && src.gamepad.buttons[0].pressed) {
        selectingSources.push(src);
      }
    }
    const twoHands = selectingSources.length >= 2 ||
      (controller0.userData.selecting && controller1.userData.selecting);
    if (twoHands) {
      controller0.getWorldPosition(_c0Pos);
      controller1.getWorldPosition(_c1Pos);
      if (!pinchState.active) {
        pinchState.startDist = _c0Pos.distanceTo(_c1Pos);
        pinchState.startScale = graphGroup.scale.x;
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        pinchState.startMid.copy(_midPos);
        pinchState.startGroupPos.copy(graphGroup.position);
        pinchState.active = pinchState.startDist > 0.01;
      } else {
        const curDist = _c0Pos.distanceTo(_c1Pos);
        const scale = Math.min(Math.max(pinchState.startScale * (curDist / pinchState.startDist), 0.2), 5);
        graphGroup.scale.setScalar(scale);
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        graphGroup.position.copy(pinchState.startGroupPos).add(
          _midPos.clone().sub(pinchState.startMid)
        );
      }
    } else {
      pinchState.active = false;
    }

    // VR raycasting from both controllers, pick closest hit
    const tempMatrix = new THREE.Matrix4();
    const rayDir = new THREE.Vector3(Math.sin(RAY_PITCH), 0, -Math.cos(RAY_PITCH));
    let bestHit = null;
    for (const ctrl of [controller0, controller1]) {
      tempMatrix.identity().extractRotation(ctrl.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
      raycaster.ray.direction.copy(rayDir).applyMatrix4(tempMatrix);
      const hits = raycaster.intersectObjects(nodeMeshes, false);
      if (hits.length > 0 && (!bestHit || hits[0].distance < bestHit.distance)) {
        bestHit = hits[0];
      }
    }
    if (bestHit) {
      highlightNode(bestHit.object.userData.nodeId);
    } else {
      if (!selectedNode) highlightNode(null);
    }
    // Position VR info panel near selected node, facing camera
    if (vrInfoText.visible && selectedNode) {
      const sn = nodeMap.get(selectedNode);
      if (sn) {
        sn.mesh.getWorldPosition(vrInfoText.position);
        vrInfoText.position.x += sn.size * 0.5 + 0.4;
        vrInfoText.position.y += sn.size * 0.3;
        vrInfoText.quaternion.copy(camera.quaternion);
      }
    }
    renderer.render(scene, camera);
  }
}

renderer.setAnimationLoop(animate);

// ═══════════════════════════════════════════
// RPC CONNECTION
// ═══════════════════════════════════════════

function connectRpc() {
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = 'Connecting to ' + RPC_URL.replace('wss://', '') + '...';

  ws = new WebSocket(RPC_URL);
  ws.onopen = () => {
    subtitle.textContent = 'Connected, fetching network...';
    fetchNetworkData();
  };
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.id != null && rpcCallbacks.has(msg.id)) {
      const cb = rpcCallbacks.get(msg.id);
      clearTimeout(cb.timer);
      rpcCallbacks.delete(msg.id);
      if (msg.error) cb.reject(msg.error);
      else cb.resolve(msg.result);
    }
  };
  ws.onerror = () => {
    subtitle.textContent = 'Connection error, retrying...';
  };
  ws.onclose = () => {
    setTimeout(connectRpc, 5000);
  };
}

async function fetchNetworkData() {
  try {
    const [peerId, health, chain, name, version, syncState] = await Promise.all([
      rpcCall('system_localPeerId'),
      rpcCall('system_health'),
      rpcCall('system_chain'),
      rpcCall('system_name'),
      rpcCall('system_version'),
      rpcCall('system_syncState'),
    ]);
    localPeerId = peerId;
    chainName = chain;
    nodeName = name;
    nodeVersion = version;

    updateGraph(localPeerId, health, syncState);
  } catch (e) {
    console.error('RPC error:', e);
    document.getElementById('subtitle').textContent = 'RPC error: ' + e.message;
  }
  if (ws && ws.readyState === WebSocket.OPEN) {
    setTimeout(fetchNetworkData, 15000);
  }
}

connectRpc();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>

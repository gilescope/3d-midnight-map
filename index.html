// ═══════════════════════════════════════════
// SCALE DECODER (minimal, for metadata + extrinsics)
// ═══════════════════════════════════════════

class ScaleReader {
  constructor(hex) {
    const h = hex.startsWith('0x') ? hex.slice(2) : hex;
    this.b = new Uint8Array(h.length / 2);
    for (let i = 0; i < this.b.length; i++) this.b[i] = parseInt(h.substr(i * 2, 2), 16);
    this.o = 0;
  }
  u8() { return this.b[this.o++]; }
  u32() {
    const v = this.b[this.o] | (this.b[this.o+1] << 8) | (this.b[this.o+2] << 16) | (this.b[this.o+3] << 24);
    this.o += 4; return v >>> 0;
  }
  compact() {
    const f = this.b[this.o], m = f & 3;
    if (m === 0) { this.o++; return f >> 2; }
    if (m === 1) { const v = (this.b[this.o] | (this.b[this.o+1] << 8)) >> 2; this.o += 2; return v; }
    if (m === 2) { const v = (this.b[this.o] | (this.b[this.o+1] << 8) | (this.b[this.o+2] << 16) | (this.b[this.o+3] << 24)) >> 2; this.o += 4; return v >>> 0; }
    const len = (f >> 2) + 4; this.o++; let v = 0n; for (let i = 0; i < len; i++) v |= BigInt(this.b[this.o + i]) << BigInt(i * 8); this.o += len; return Number(v);
  }
  str() { const n = this.compact(); const s = new TextDecoder().decode(this.b.subarray(this.o, this.o + n)); this.o += n; return s; }
  u16() { const v = this.b[this.o] | (this.b[this.o+1] << 8); this.o += 2; return v; }
  hex(n) { const s = Array.from(this.b.subarray(this.o, this.o + n), b => b.toString(16).padStart(2, '0')).join(''); this.o += n; return '0x' + s; }
  bigU(n) { let v = 0n; for (let i = 0; i < n; i++) v |= BigInt(this.b[this.o + i]) << BigInt(i * 8); this.o += n; return v; }
  skip(n) { this.o += n; }
  vec(fn) { const n = this.compact(), r = []; for (let i = 0; i < n; i++) r.push(fn()); return r; }
  opt(fn) { return this.u8() ? fn() : null; }
  bytes() { const n = this.compact(); this.o += n; }
}

let typesRegistry = {};

function parseMetadata(hex) {
  try {
    const r = new ScaleReader(hex);
    r.skip(4); // "meta" magic
    const ver = r.u8();
    if (ver !== 14 && ver !== 15) return null;
    // Types registry: Vec<PortableType> — store full type defs for event decoding
    const types = {};
    const readFields = () => r.vec(() => {
      const n = r.opt(() => r.str()); const ty = r.compact(); r.opt(() => r.str()); r.vec(() => r.str());
      return { n, t: ty };
    });
    r.vec(() => {
      const id = r.compact();
      r.vec(() => r.str()); // path
      r.vec(() => { r.str(); r.opt(() => r.compact()); }); // type_params
      const def = r.u8();
      if (def === 0) { types[id] = { k: 'c', f: readFields() }; } // Composite
      else if (def === 1) { // Variant
        types[id] = { k: 'v', v: r.vec(() => {
          const name = r.str(); const f = readFields(); const idx = r.u8(); r.vec(() => r.str());
          return { name, index: idx, f };
        })};
      }
      else if (def === 2) { types[id] = { k: 's', t: r.compact() }; } // Sequence
      else if (def === 3) { const len = r.u32(); types[id] = { k: 'a', len, t: r.compact() }; } // Array
      else if (def === 4) { types[id] = { k: 'tu', f: r.vec(() => ({ n: null, t: r.compact() })) }; } // Tuple
      else if (def === 5) { types[id] = { k: 'p', p: r.u8() }; } // Primitive
      else if (def === 6) { types[id] = { k: 'co', t: r.compact() }; } // Compact
      else if (def === 7) { r.compact(); r.compact(); types[id] = { k: 'bs' }; } // BitSequence
      r.vec(() => r.str()); // docs
    });
    typesRegistry = types;
    // Pallets: Vec<PalletMetadata>
    const pallets = {};
    r.vec(() => {
      const name = r.str();
      r.opt(() => { r.str(); r.vec(() => { r.str(); r.u8(); const st = r.u8(); if (st === 0) r.compact(); else { r.vec(() => r.u8()); r.compact(); r.compact(); } r.bytes(); r.vec(() => r.str()); }); }); // storage
      const callTy = r.opt(() => r.compact());
      const eventTy = r.opt(() => r.compact());
      r.vec(() => { // constants
        const cName = r.str(); r.compact();
        const cLen = r.compact();
        if (name === 'System' && cName === 'BlockLength' && cLen >= 4) {
          maxBlockBytes = r.b[r.o] | (r.b[r.o+1] << 8) | (r.b[r.o+2] << 16) | (r.b[r.o+3] << 24);
          console.log('BlockLength normal:', maxBlockBytes);
        }
        r.skip(cLen);
        r.vec(() => r.str());
      });
      r.opt(() => r.compact()); // error
      const index = r.u8();
      let calls = null;
      if (callTy !== null && types[callTy]?.k === 'v') {
        calls = {};
        for (const v of types[callTy].v) calls[v.index] = v.name;
      }
      let events = null;
      if (eventTy !== null && types[eventTy]?.k === 'v') {
        events = {};
        for (const v of types[eventTy].v) events[v.index] = v.name;
      }
      pallets[index] = { name, calls, events, eventTy };
    });
    console.log('Parsed metadata:', Object.keys(pallets).length, 'pallets');
    return pallets;
  } catch (e) {
    console.error('Metadata parse error:', e);
    return null;
  }
}

// Skip a SCALE-encoded value of a given type (advance reader past it)
const PRIM_SIZES = [1,4,-1,1,2,4,8,16,32,1,2,4,8,16,32]; // bool,char,str,u8..u256,i8..i256
function skipScaleType(r, tid) {
  const t = typesRegistry[tid];
  if (!t) { r.skip(1); return; } // unknown: skip 1 byte and hope
  switch (t.k) {
    case 'c': for (const f of t.f) skipScaleType(r, f.t); break; // composite
    case 'v': { // variant
      const idx = r.u8();
      const vr = t.v.find(v => v.index === idx);
      if (vr) for (const f of vr.f) skipScaleType(r, f.t);
      break;
    }
    case 's': r.vec(() => skipScaleType(r, t.t)); break; // sequence/vec
    case 'a': for (let i = 0; i < t.len; i++) skipScaleType(r, t.t); break; // array
    case 'tu': for (const f of t.f) skipScaleType(r, f.t); break; // tuple
    case 'p': t.p === 2 ? r.str() : r.skip(PRIM_SIZES[t.p]); break; // primitive
    case 'co': r.compact(); break; // compact
    case 'bs': { const bits = r.compact(); r.skip(Math.ceil(bits / 8)); break; } // bitsequence
  }
}

// Read a SCALE-encoded value and return decoded JS value
function readScaleType(r, tid, depth) {
  if (depth > 10 || r.o >= r.b.length) return '?';
  const t = typesRegistry[tid];
  if (!t) return r.u8();
  switch (t.k) {
    case 'c': {
      if (t.f.length === 0) return {};
      const obj = {};
      for (const f of t.f) obj[f.n || '_'] = readScaleType(r, f.t, depth + 1);
      return t.f.length === 1 && !t.f[0].n ? obj['_'] : obj;
    }
    case 'v': {
      const idx = r.u8();
      const vr = t.v.find(v => v.index === idx);
      if (!vr) return `variant(${idx})`;
      if (vr.f.length === 0) return vr.name;
      const fields = {};
      for (const f of vr.f) fields[f.n || '_'] = readScaleType(r, f.t, depth + 1);
      return { [vr.name]: vr.f.length === 1 && !vr.f[0].n ? fields['_'] : fields };
    }
    case 's': {
      const inner = typesRegistry[t.t];
      if (inner?.k === 'p' && inner.p === 3) { const n = r.compact(); return r.hex(n); }
      return r.vec(() => readScaleType(r, t.t, depth + 1));
    }
    case 'a': {
      const inner = typesRegistry[t.t];
      if (inner?.k === 'p' && inner.p === 3) return r.hex(t.len); // [u8; N] → hex
      const arr = [];
      for (let i = 0; i < t.len; i++) arr.push(readScaleType(r, t.t, depth + 1));
      return arr;
    }
    case 'tu': {
      const arr = [];
      for (const f of t.f) arr.push(readScaleType(r, f.t, depth + 1));
      return arr.length === 1 ? arr[0] : arr;
    }
    case 'p': {
      if (t.p === 0) return r.u8() !== 0; // bool
      if (t.p === 1) return r.u32(); // char
      if (t.p === 2) return r.str(); // str
      if (t.p === 3 || t.p === 9) return r.u8(); // u8/i8
      if (t.p === 4 || t.p === 10) return r.u16(); // u16/i16
      if (t.p === 5 || t.p === 11) return r.u32(); // u32/i32
      const sz = PRIM_SIZES[t.p];
      if (sz > 0) return r.bigU(sz).toString(); // u64+/i64+
      return '?';
    }
    case 'co': return r.compact();
    case 'bs': { const bits = r.compact(); r.skip(Math.ceil(bits / 8)); return `${bits}bits`; }
  }
  return '?';
}

function decodeEventFields(hex, fieldTypes) {
  const r = new ScaleReader(hex);
  const fields = {};
  for (const f of fieldTypes) {
    const key = f.n || `field_${Object.keys(fields).length}`;
    fields[key] = readScaleType(r, f.t, 0);
  }
  return fields;
}

function formatVal(v, indent) {
  const pad = '  '.repeat(indent);
  if (v === null || v === undefined) return 'null';
  if (Array.isArray(v)) {
    if (v.length === 0) return '[]';
    const items = v.map((item, i) => {
      if (item && typeof item === 'object') return pad + '  [' + i + ']:\n' + formatVal(item, indent + 2);
      return pad + '  ' + formatVal(item, 0);
    });
    return '(' + v.length + ')\n' + items.join('\n');
  }
  if (v && typeof v === 'object') {
    return Object.entries(v).map(([k, val]) =>
      pad + k + ': ' + formatVal(val, indent + 1)
    ).join('\n');
  }
  let s = String(v);
  if (s.startsWith('0x') && s.length > 22) s = s.slice(0, 10) + '..' + s.slice(-8);
  return s;
}

// Decode System.Events storage → [{phase, extIndex, pallet, event, name}]
function decodeBlockEvents(eventsHex) {
  if (!palletInfo || !eventsHex) return [];
  try {
    const r = new ScaleReader(eventsHex);
    const count = r.compact();
    const events = [];
    for (let i = 0; i < count; i++) {
      const phase = r.u8();
      const extIndex = phase === 0 ? r.u32() : -1;
      // Event: pallet_index + event encoded as variant of pallet's event type
      const palletIdx = r.u8();
      const eventIdx = r.u8();
      const pallet = palletInfo[palletIdx];
      const eventName = pallet?.events?.[eventIdx];
      const fullName = (pallet?.name || palletIdx) + '.' + (eventName || eventIdx);
      // Capture field bytes for on-demand decoding, then skip past them
      let fieldHex = null, fieldTypes = null;
      if (pallet?.eventTy && typesRegistry[pallet.eventTy]?.k === 'v') {
        const vr = typesRegistry[pallet.eventTy].v.find(v => v.index === eventIdx);
        if (vr) {
          fieldTypes = vr.f;
          const startOff = r.o;
          try { for (const f of vr.f) skipScaleType(r, f.t); } catch {}
          if (r.o > startOff) {
            const rawHex = eventsHex.startsWith('0x') ? eventsHex.slice(2) : eventsHex;
            fieldHex = '0x' + rawHex.substr(startOff * 2, (r.o - startOff) * 2);
          }
        }
      }
      // Skip topics: Vec<H256>
      const topicCount = r.compact();
      r.skip(topicCount * 32);
      events.push({ phase, extIndex, palletIdx, eventIdx, name: fullName, fieldHex, fieldTypes });
    }
    return events;
  } catch (e) {
    console.warn('Event decode error:', e);
    return [];
  }
}

function decodeExtrinsicCall(extHex) {
  try {
    const r = new ScaleReader(extHex);
    r.compact(); // length prefix
    const ver = r.u8();
    const signed = (ver & 0x80) !== 0;
    if (signed) {
      const addrKind = r.u8();
      if (addrKind === 0) r.skip(32); else return null;
      const sigKind = r.u8();
      if (sigKind <= 1) r.skip(64); else if (sigKind === 2) r.skip(65); else return null;
      // Signed extensions (common Substrate: Era + compact nonce + compact tip)
      const era = r.u8();
      if (era !== 0) r.u8(); // mortal era = 2 bytes
      r.compact(); // nonce
      r.compact(); // tip
    }
    const palletIndex = r.u8();
    const callIndex = r.u8();
    // Validate against known pallets
    if (palletInfo && !palletInfo[palletIndex]) return null;
    return { palletIndex, callIndex };
  } catch (e) {
    return null;
  }
}

function formatCallName(extHex) {
  if (!palletInfo) return null;
  const call = decodeExtrinsicCall(extHex);
  if (!call) return null;
  const pallet = palletInfo[call.palletIndex];
  if (!pallet) return null;
  const callName = pallet.calls ? pallet.calls[call.callIndex] : null;
  return pallet.name + '.' + (callName || call.callIndex);
}

// Indexer: fetch ledger transaction fees for a block
async function fetchBlockFees(blockHeight) {
  try {
    const query = `{ block(offset: { height: ${blockHeight} }) { transactions { hash ... on RegularTransaction { fees { paidFees estimatedFees } transactionResult { status } } } } }`;
    const resp = await fetch(INDEXER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const json = await resp.json();
    const txs = json?.data?.block?.transactions || [];
    const regular = txs.filter(t => t.fees);
    if (regular.length === 0) return null;
    const totalPaid = regular.reduce((s, t) => s + BigInt(t.fees.paidFees), 0n);
    const totalEstimated = regular.reduce((s, t) => s + BigInt(t.fees.estimatedFees), 0n);
    return { txCount: regular.length, totalPaid, totalEstimated, txs: regular };
  } catch { return null; }
}

function formatDust(val) {
  return Number(val).toLocaleString() + ' tDUST';
}

// Block tracking: ordered newest-first
const blockList = [];
// { number, hash, extrinsics: [hex...], finalized, nodeId, extNodeIds: [...], feeData }

let edges = [];

// Cardano block tracking
const cardanoBlocks = new Map();
const cardanoBlockList = [];
const CARDANO_Y_OFFSET = -8;
const pendingCardanoFetches = new Map();

function parseMcshDigest(digestLogs) {
  const MCSH = '6d637368';
  for (const log of digestLogs) {
    const hex = log.startsWith('0x') ? log.slice(2) : log;
    if (hex.length >= 76 && hex.slice(0, 2) === '06' && hex.slice(2, 10) === MCSH) {
      return hex.slice(12, 76);
    }
  }
  return null;
}

function getOrCreateCardanoNode(hash) {
  if (cardanoBlocks.has(hash)) return cardanoBlocks.get(hash);
  const nodeId = 'cardano-' + hash.slice(0, 16);
  const cb = { hash, nodeId, referencedBy: new Set() };
  cardanoBlocks.set(hash, cb);
  const pos = new THREE.Vector3(0, CARDANO_Y_OFFSET, 0);
  addNode(nodeId, shortHash(hash), COLORS.cardano, HEX.cardano, 1.0, pos, {
    type: 'cardano', cardanoHash: hash,
  });
  cardanoBlockList.push(cb);
  repositionCardanoBlocks();
  updateSubtitle();
  return cb;
}

function rpcCall(method, params = []) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject(new Error('Not connected'));
      return;
    }
    const id = ++rpcId;
    const timer = setTimeout(() => {
      rpcCallbacks.delete(id);
      reject(new Error('Timeout'));
    }, 10000);
    rpcCallbacks.set(id, { resolve, reject, timer });
    ws.send(JSON.stringify({ jsonrpc: '2.0', id, method, params }));
  });
}

function shortHash(h) {
  if (!h) return '???';
  return h.slice(0, 10) + '...' + h.slice(-6);
}

function makeGlowTexture() {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
}

const nodeMap = new Map();
const nodeMeshes = [];
const labelEntries = [];
const edgeData = [];
const graphGroup = new THREE.Group();
scene.add(graphGroup);
const edgeGroup = new THREE.Group();
graphGroup.add(edgeGroup);

const PARTICLES_PER_EDGE = 3;
const MAX_PARTICLES = 500 * PARTICLES_PER_EDGE;
const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
const pMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.InstancedMesh(pGeo, pMat, MAX_PARTICLES);
particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
particles.count = 0;
graphGroup.add(particles);

function addNode(id, label, color, hex, size, pos, extraData) {
  if (nodeMap.has(id)) return;
  const sz = size || 1;

  const geo = new THREE.IcosahedronGeometry(sz * 0.5, sz > 1.3 ? 1 : 0);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 1.5,
    metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  graphGroup.add(mesh);

  const glowMaterial = new THREE.SpriteMaterial({
    map: glowTex, color,
    transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMaterial);
  glow.scale.setScalar(sz * 3);
  mesh.add(glow);

  const textLabel = new Text();
  textLabel.text = label;
  textLabel.fontSize = sz > 1 ? 0.32 : 0.22;
  textLabel.color = hex;
  textLabel.anchorX = 'center';
  textLabel.anchorY = 'bottom';
  textLabel.position.y = sz * 0.5 + 0.4;
  textLabel.outlineWidth = '8%';
  textLabel.outlineColor = 0x000000;
  textLabel.outlineOpacity = 0.6;
  textLabel.depthOffset = -1;
  textLabel.font = ORBITRON_URL;
  textLabel.sync();
  mesh.add(textLabel);
  labelEntries.push({ label: textLabel, mesh });

  const entry = {
    id, label, size: sz, pos, vel: new THREE.Vector3(),
    mesh, glow, phase: Math.random() * Math.PI * 2,
    color, hex, ...extraData,
  };
  nodeMap.set(id, entry);
  nodeMeshes.push(mesh);
  mesh.userData = { nodeId: id };
}

function removeNode(id) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  graphGroup.remove(entry.mesh);
  entry.mesh.geometry.dispose();
  entry.mesh.material.dispose();
  nodeMap.delete(id);
  const mi = nodeMeshes.indexOf(entry.mesh);
  if (mi >= 0) nodeMeshes.splice(mi, 1);
  const li = labelEntries.findIndex(e => e.mesh === entry.mesh);
  if (li >= 0) labelEntries.splice(li, 1);
}

function setNodeColor(id, color, hex) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  entry.color = color;
  entry.hex = hex;
  entry.mesh.material.color.copy(color);
  entry.mesh.material.emissive.copy(color);
  entry.glow.material.color.copy(color);
  // Update label color
  const li = labelEntries.find(e => e.mesh === entry.mesh);
  if (li) li.label.color = hex;
}

function rebuildEdges() {
  for (const e of edgeData) {
    edgeGroup.remove(e.line);
    e.geo.dispose();
    e.line.material.dispose();
  }
  edgeData.length = 0;

  for (const [srcId, tgtId] of edges) {
    const src = nodeMap.get(srcId), tgt = nodeMap.get(tgtId);
    if (!src || !tgt) continue;
    if (!src.mesh.visible || !tgt.mesh.visible) continue;
    const srcColor = src.color || COLORS.block;
    const tgtColor = tgt.color || COLORS.block;

    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    const colors = new Float32Array(6);
    srcColor.toArray(colors, 0);
    tgtColor.toArray(colors, 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);

    edgeData.push({
      src, tgt, line, geo,
      speed: 0.2 + Math.random() * 0.3,
      phaseOffsets: [Math.random(), Math.random(), Math.random()],
    });
  }
  particles.count = Math.min(edgeData.length * PARTICLES_PER_EDGE, MAX_PARTICLES);
}

// ═══════════════════════════════════════════
// BLOCK GRAPH MANAGEMENT
// ═══════════════════════════════════════════

function addBlock(number, hash, extrinsics, digestLogs, hasLedgerTxs = false) {
  // Don't add duplicates
  if (blockList.find(b => b.number === number)) return;

  const blockId = 'block-' + number;
  const extNodeIds = [];
  const extCount = extrinsics.length;
  const blockSize = 1.2 + Math.min(extCount * 0.1, 0.8);
  const totalBytes = extrinsics.reduce((sum, hex) => sum + (hex.length - 2) / 2, 0);

  // Block position: newest at x=0, will be shifted
  const pos = new THREE.Vector3(0, 0, 0);
  addNode(blockId, '#' + number, COLORS.block, HEX.block, blockSize, pos, {
    type: 'block', blockNumber: number, blockHash: hash, extCount, totalBytes,
  });

  // Extrinsic nodes
  for (let i = 0; i < extCount; i++) {
    const extId = 'ext-' + number + '-' + i;
    const extHex = extrinsics[i];
    const extBytes = (extHex.length - 2) / 2;
    const angle = (i / extCount) * Math.PI * 2;
    const radius = 2 + Math.random();
    const extPos = new THREE.Vector3(
      radius * Math.cos(angle),
      radius * Math.sin(angle),
      (Math.random() - 0.5) * 2
    );
    const callName = formatCallName(extHex);
    addNode(extId, callName || ('Ext ' + i), COLORS.extrinsic, HEX.extrinsic, 0.5, extPos, {
      type: 'extrinsic', extIndex: i, extBytes, extHex, blockNumber: number, callName,
    });
    extNodeIds.push(extId);
  }

  const bd = { number, hash, extrinsics, finalized: false, nodeId: blockId, extNodeIds, hasLedgerTxs };
  // Insert sorted by block number (descending)
  const insertIdx = blockList.findIndex(b => b.number < number);
  if (insertIdx === -1) blockList.push(bd);
  else blockList.splice(insertIdx, 0, bd);
  console.log('Blocks:', blockList.length, 'Nodes:', nodeMap.size, 'Block:', number);

  // Check if already finalized
  if (number <= lastFinalizedNumber) {
    bd.finalized = true;
    setNodeColor(blockId, COLORS.finalized, HEX.finalized);
    for (const eid of extNodeIds) setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
  }

  // Parse mcsh digest for Cardano block reference
  if (digestLogs) {
    const mcshHash = parseMcshDigest(digestLogs);
    if (mcshHash) {
      bd.cardanoHash = mcshHash;
      const cb = getOrCreateCardanoNode(mcshHash);
      cb.referencedBy.add(number);
      bd.cardanoNodeId = cb.nodeId;
    }
  }

  // Fetch fee data from indexer (async, non-blocking)
  fetchBlockFees(number).then(feeData => {
    if (feeData) {
      bd.feeData = feeData;
      bd.hasLedgerTxs = true;
      const entry = nodeMap.get(blockId);
      if (entry) entry.feeData = feeData;
      if (!visibleFilters.empty) applyFilters();
      if (selectedNode === blockId) showInfo(blockId);
    }
  });

  // Fetch and decode events (async)
  bd.eventNodeIds = [];
  rpcCall('state_getStorage', [EVENTS_KEY, hash]).then(eventsHex => {
    if (!eventsHex) return;
    const events = decodeBlockEvents(eventsHex);
    // Group events by extrinsic index
    const extEvents = {};
    for (const ev of events) {
      if (ev.extIndex < 0) continue; // skip Initialization/Finalization phase
      if (!extEvents[ev.extIndex]) extEvents[ev.extIndex] = [];
      extEvents[ev.extIndex].push(ev);
    }
    for (const [extIdxStr, evts] of Object.entries(extEvents)) {
      const extIdx = parseInt(extIdxStr);
      const parentExtId = 'ext-' + number + '-' + extIdx;
      const parentEntry = nodeMap.get(parentExtId);
      if (!parentEntry) continue;
      for (let j = 0; j < evts.length; j++) {
        const ev = evts[j];
        const evId = 'evt-' + number + '-' + extIdx + '-' + j;
        const angle = (j / evts.length) * Math.PI * 2;
        const r2 = 1.2 + Math.random() * 0.4;
        const evPos = new THREE.Vector3(
          parentEntry.pos.x + r2 * Math.cos(angle),
          parentEntry.pos.y + r2 * Math.sin(angle),
          parentEntry.pos.z + (Math.random() - 0.5)
        );
        addNode(evId, ev.name.split('.')[1] || ev.name, COLORS.event, HEX.event, 0.35, evPos, {
          type: 'event', eventName: ev.name, blockNumber: number, extIndex: extIdx,
          parentExtId, fieldHex: ev.fieldHex, fieldTypes: ev.fieldTypes,
        });
        bd.eventNodeIds.push(evId);
      }
    }
    if (bd.eventNodeIds.length > 0) {
      applyFilters();
      forceSettleSteps = 100;
    }
  }).catch(() => {});

  // Reposition all blocks along X axis
  repositionBlocks();
  applyFilters();
  forceSettleSteps = 150;
}

function repositionBlocks() {
  let visIdx = 0;
  for (let i = 0; i < blockList.length; i++) {
    const bd = blockList[i];
    const entry = nodeMap.get(bd.nodeId);
    if (!entry) continue;
    if (!entry.mesh.visible) { entry.targetX = undefined; continue; }
    const targetX = -visIdx * BLOCK_SPACING;
    entry.targetX = targetX;
    visIdx++;
    // Set initial position for new nodes
    if (i === 0 && Math.abs(entry.pos.x) < 0.01 && Math.abs(entry.pos.y) < 0.01) {
      entry.pos.x = targetX;
    }
    // Position extrinsics relative to block
    for (let j = 0; j < bd.extNodeIds.length; j++) {
      const extEntry = nodeMap.get(bd.extNodeIds[j]);
      if (!extEntry) continue;
      extEntry.parentBlockId = bd.nodeId;
      // Offset extrinsic position from block
      if (extEntry.pos.length() < 3) {
        const angle = (j / bd.extNodeIds.length) * Math.PI * 2;
        const r = 2.5 + Math.random() * 0.5;
        extEntry.pos.x = targetX + r * Math.cos(angle);
        extEntry.pos.y = r * Math.sin(angle);
        extEntry.pos.z = (Math.random() - 0.5) * 2;
      }
    }
  }
}

function repositionCardanoBlocks() {
  for (let i = 0; i < cardanoBlockList.length; i++) {
    const cb = cardanoBlockList[i];
    const entry = nodeMap.get(cb.nodeId);
    if (!entry) continue;
    entry.targetX = -i * BLOCK_SPACING;
    entry.targetY = CARDANO_Y_OFFSET;
  }
}

function rebuildAllEdges() {
  edges = [];
  // Chain links between visible consecutive blocks
  let prevVisible = null;
  for (let i = 0; i < blockList.length; i++) {
    const entry = nodeMap.get(blockList[i].nodeId);
    if (entry && entry.mesh.visible) {
      if (prevVisible !== null) edges.push([prevVisible, blockList[i].nodeId]);
      prevVisible = blockList[i].nodeId;
    }
  }
  // Block -> extrinsic links + extrinsic -> event links
  for (const bd of blockList) {
    for (const eid of bd.extNodeIds) {
      edges.push([bd.nodeId, eid]);
    }
    if (bd.eventNodeIds) {
      for (const evId of bd.eventNodeIds) {
        const evEntry = nodeMap.get(evId);
        if (evEntry?.parentExtId) edges.push([evEntry.parentExtId, evId]);
      }
    }
    // Cross-chain link: Midnight block -> Cardano block
    if (bd.cardanoNodeId) {
      edges.push([bd.nodeId, bd.cardanoNodeId]);
    }
  }
  // Cardano chain links (between visible nodes)
  let prevCardano = null;
  for (let i = 0; i < cardanoBlockList.length; i++) {
    const entry = nodeMap.get(cardanoBlockList[i].nodeId);
    if (entry && entry.mesh.visible) {
      if (prevCardano !== null) edges.push([prevCardano, cardanoBlockList[i].nodeId]);
      prevCardano = cardanoBlockList[i].nodeId;
    }
  }
  rebuildEdges();
}

function finalizeUpTo(number) {
  lastFinalizedNumber = number;
  for (const bd of blockList) {
    if (bd.number <= number && !bd.finalized) {
      bd.finalized = true;
      setNodeColor(bd.nodeId, COLORS.finalized, HEX.finalized);
      for (const eid of bd.extNodeIds) {
        setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
      }
    }
  }
  applyFilters();
  updateSubtitle();
}

function updateSubtitle() {
  const newest = blockList.length > 0 ? blockList[0].number : '?';
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = chainName +
    ' // best: #' + newest +
    ' // finalized: #' + lastFinalizedNumber +
    ' // blocks: ' + blockList.length +
    ' // cardano: ' + cardanoBlockList.length +
    ' // nodes: ' + nodeMap.size;
}

function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = radius * (0.3 + Math.random() * 0.7);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return geo;
}

// ═══════════════════════════════════════════
// NETWORK STARS — deterministic position from name hash
// ═══════════════════════════════════════════

function hashStr(s) {
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) h = Math.imul(h ^ s.charCodeAt(i), 0x01000193);
  return h >>> 0;
}

function networkColor(name) {
  const h = hashStr(name);
  return new THREE.Color().setHSL((h & 0xffff) / 0xffff, 0.8, 0.6);
}

function networkPosition(name, radius) {
  const h1 = hashStr(name), h2 = hashStr(name + '_phi');
  const theta = ((h1 & 0xffff) / 0xffff) * Math.PI * 2;
  const phi = Math.acos(2 * ((h2 & 0xffff) / 0xffff) - 1);
  return new THREE.Vector3(
    radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi)
  );
}

const networkStars = [];
const STAR_RADIUS = 60;
for (const net of NETWORKS) {
  const pos = networkPosition(net.name, STAR_RADIUS);
  const color = networkColor(net.name);
  const isCurrent = net === currentNetwork;

  // Core sphere
  const geo = new THREE.IcosahedronGeometry(isCurrent ? 2.0 : 1.2, 2);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: isCurrent ? 3.0 : 1.5,
    metalness: 0.3, roughness: 0.2, transparent: true, opacity: 0.95,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);

  // Glow sprite
  const glowMat = new THREE.SpriteMaterial({
    map: glowTex, color,
    transparent: true, opacity: isCurrent ? 0.9 : 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMat);
  glow.scale.setScalar(isCurrent ? 12 : 7);
  mesh.add(glow);

  // Label
  const label = new Text();
  label.text = net.name;
  label.fontSize = 0.8;
  label.color = '#' + color.getHexString();
  label.anchorX = 'center';
  label.anchorY = 'bottom';
  label.position.y = 2.0;
  label.outlineWidth = '10%';
  label.outlineColor = 0x000000;
  label.outlineOpacity = 0.8;
  label.font = ORBITRON_URL;
  label.sync();
  mesh.add(label);
  labelEntries.push({ label, mesh });

  mesh.userData = { networkName: net.name, network: net };
  networkStars.push({ net, mesh, glow, label, color, pos });
}

let hyperspaceActive = false;
const hyperLines = [];

function clearAllState() {
  // Abort scanner
  if (scannerAbort) { scannerAbort.abort(); scannerAbort = null; }
  // Close websocket without auto-reconnect
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  // Clear RPC callbacks
  for (const cb of rpcCallbacks.values()) clearTimeout(cb.timer);
  rpcCallbacks.clear();
  rpcId = 0;
  // Remove all graph nodes
  const ids = [...nodeMap.keys()];
  for (const id of ids) removeNode(id);
  blockList.length = 0;
  cardanoBlockList.length = 0;
  edges.length = 0;
  edgeData.length = 0;
  // Reset state
  selectedNode = null;
  hoveredNode = null;
  lastFinalizedNumber = 0;
  chainName = '';
  palletInfo = null;
  typesRegistry = {};
  forceSettleSteps = 0;
  hideInfo();
  rebuildAllEdges();
}

function createHyperLines(targetPos) {
  const group = new THREE.Group();
  scene.add(group);
  const dir = targetPos.clone().normalize();
  for (let i = 0; i < 120; i++) {
    const offset = new THREE.Vector3(
      (Math.random() - 0.5) * 30,
      (Math.random() - 0.5) * 30,
      (Math.random() - 0.5) * 30
    );
    const start = dir.clone().multiplyScalar(5).add(offset);
    const end = dir.clone().multiplyScalar(60 + Math.random() * 30).add(offset);
    const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
    const hue = 0.5 + Math.random() * 0.2;
    const col = new THREE.Color().setHSL(hue, 1.0, 0.7);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
      color: col, transparent: true, opacity: 0,
    }));
    group.add(line);
    hyperLines.push({ line, delay: Math.random() * 0.3 });
  }
  return group;
}

function hyperspaceTo(network) {
  if (hyperspaceActive || network === currentNetwork) return;
  hyperspaceActive = true;

  const star = networkStars.find(s => s.net === network);
  const targetPos = star ? star.pos.clone() : new THREE.Vector3(0, 0, -60);
  const hyperGroup = createHyperLines(targetPos);

  // Update network star appearances
  const oldStar = networkStars.find(s => s.net === currentNetwork);
  if (oldStar) {
    oldStar.mesh.material.emissiveIntensity = 1.5;
    oldStar.glow.material.opacity = 0.5;
    oldStar.mesh.geometry.dispose();
    oldStar.mesh.geometry = new THREE.IcosahedronGeometry(1.2, 2);
    oldStar.glow.scale.setScalar(7);
  }

  let elapsed = 0;
  const duration = 1.5;
  const tick = () => {
    elapsed += 1 / 60;
    const t = Math.min(elapsed / duration, 1);

    // Animate hyperspace lines
    for (const hl of hyperLines) {
      const lt = Math.max(0, Math.min(1, (t - hl.delay) / 0.5));
      hl.line.material.opacity = lt < 0.8 ? lt : Math.max(0, 1 - (lt - 0.8) / 0.2);
    }

    // Screen flash at midpoint
    if (t > 0.4 && t < 0.6) {
      renderer.setClearColor(0xffffff, (0.6 - Math.abs(t - 0.5)) * 3);
    } else {
      renderer.setClearColor(0x050510, 1);
    }

    if (t >= 1) {
      // Cleanup hyperspace lines
      scene.remove(hyperGroup);
      for (const hl of hyperLines) { hl.line.geometry.dispose(); hl.line.material.dispose(); }
      hyperLines.length = 0;
      renderer.setClearColor(0x050510, 1);

      // Switch network
      currentNetwork = network;
      RPC_URL = network.rpc;
      INDEXER_URL = network.indexer;
      clearAllState();

      // Highlight new star
      if (star) {
        star.mesh.material.emissiveIntensity = 3.0;
        star.glow.material.opacity = 0.9;
        star.mesh.geometry.dispose();
        star.mesh.geometry = new THREE.IcosahedronGeometry(2.0, 2);
        star.glow.scale.setScalar(12);
      }

      connectRpc();
      hyperspaceActive = false;
      return;
    }
    requestAnimationFrame(tick);
  };
  tick();
}

// ═══════════════════════════════════════════
// FORCE LAYOUT
// ═══════════════════════════════════════════

let forceSettleSteps = 0;
const repulsion = 15, attraction = 0.03, damping = 0.92, minDist = 0.5;
const _diff = new THREE.Vector3();

function forceStep() {
  const allNodes = [...nodeMap.values()].filter(n => n.mesh.visible);

  // Repulsion between all nodes
  for (let i = 0; i < allNodes.length; i++) {
    for (let j = i + 1; j < allNodes.length; j++) {
      const a = allNodes[i], b = allNodes[j];
      _diff.subVectors(a.pos, b.pos);
      const d = Math.max(_diff.length(), minDist);
      const f = repulsion / (d * d);
      _diff.normalize().multiplyScalar(f);
      a.vel.add(_diff);
      b.vel.sub(_diff);
    }
  }

  // Attraction along edges
  for (const [srcId, tgtId] of edges) {
    const s = nodeMap.get(srcId), t = nodeMap.get(tgtId);
    if (!s || !t || !s.mesh.visible || !t.mesh.visible) continue;
    _diff.subVectors(t.pos, s.pos);
    const d = _diff.length();
    const crossChain = (s.type === 'block' && t.type === 'cardano') || (s.type === 'cardano' && t.type === 'block');
    const chainLink = (s.type === 'block' && t.type === 'block') || (s.type === 'cardano' && t.type === 'cardano');
    const rest = chainLink ? BLOCK_SPACING : crossChain ? Math.abs(CARDANO_Y_OFFSET) : 2.5;
    const f = attraction * (d - rest);
    _diff.normalize().multiplyScalar(f);
    s.vel.add(_diff);
    t.vel.sub(_diff);
  }

  // Block positioning force: pull blocks toward their target X, center Y/Z
  for (const n of allNodes) {
    if (n.targetX !== undefined) {
      n.vel.x += (n.targetX - n.pos.x) * 0.05;
      n.vel.y += ((n.targetY !== undefined ? n.targetY : 0) - n.pos.y) * 0.01;
      n.vel.z += (0 - n.pos.z) * 0.01;
    }
    n.vel.multiplyScalar(damping);
    n.pos.add(n.vel);
  }
}

function showInfo(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  const hex = n.hex || '#00fff2';

  let title = '', layerName = '', desc = '';

  if (n.type === 'block') {
    const bd = blockList.find(b => b.nodeId === nodeId);
    title = 'Midnight Block #' + n.blockNumber;
    layerName = bd && bd.finalized ? 'Finalized' : 'Unfinalized';
    const fullness = (n.totalBytes / maxBlockBytes * 100).toFixed(2);
    const feeInfo = n.feeData
      ? '\nLedger Txs: ' + n.feeData.txCount + ' (fees: ' + formatDust(n.feeData.totalPaid) + ')'
      : '';
    desc = 'Hash: ' + shortHash(n.blockHash) +
      '\nExtrinsics: ' + n.extCount +
      '\nSize: ' + n.totalBytes.toLocaleString() + ' / ' + maxBlockBytes.toLocaleString() + ' bytes (' + fullness + '%)' +
      '\nStatus: ' + layerName +
      feeInfo +
      (bd && bd.cardanoHash ? '\nCardano: ' + shortHash(bd.cardanoHash) : '');
  } else if (n.type === 'extrinsic') {
    const pct = (n.extBytes / maxBlockBytes * 100).toFixed(2) + '%';
    title = n.callName || ('Extrinsic ' + n.extIndex);
    layerName = 'Block #' + n.blockNumber;
    desc = 'Size: ' + n.extBytes.toLocaleString() + ' bytes' +
      '\nBlock capacity: ' + pct +
      (n.callName ? '' : '\nData: ' + (n.extHex ? n.extHex.slice(0, 40) + '...' : '?'));
  } else if (n.type === 'event') {
    title = n.eventName;
    layerName = 'Block #' + n.blockNumber + ' / Ext ' + n.extIndex;
    if (n.fieldHex && n.fieldTypes && n.fieldTypes.length > 0) {
      try {
        const fields = decodeEventFields(n.fieldHex, n.fieldTypes);
        desc = formatVal(fields, 0);
      } catch (e) {
        desc = 'Event emitted by extrinsic\n(decode error: ' + e.message + ')';
      }
    } else {
      desc = 'Event emitted by extrinsic';
    }
  } else if (n.type === 'cardano') {
    title = 'Cardano Block';
    layerName = 'Partner Chain';
    desc = 'Hash: ' + shortHash(n.cardanoHash);
  }

  infoTitle.textContent = title;
  infoTitle.style.color = hex;
  infoLayer.textContent = layerName;
  infoLayer.style.color = hex;
  infoDesc.textContent = desc;
  infoConns.textContent = '';
  infoPanel.style.display = 'block';
  infoPanel.style.borderColor = hex + '44';

  if (renderer.xr.isPresenting) {
    vrInfoText.text = title + '\n' + layerName + '\n\n' + desc;
    vrInfoText.color = hex;
    vrInfoText.visible = true;
    vrInfoText.sync();
  }
}

const connectorLine = document.getElementById('connector-line');
const connectorDot = document.getElementById('connector-dot');
const _proj = new THREE.Vector3();

function hideConnector() {
  connectorLine.setAttribute('display', 'none');
  connectorDot.setAttribute('display', 'none');
}

function hideInfo() {
  infoPanel.style.display = 'none';
  vrInfoText.visible = false;
  hideConnector();
}

function updateConnector() {
  if (!selectedNode || infoPanel.style.display === 'none' || renderer.xr.isPresenting) { hideConnector(); return; }
  const n = nodeMap.get(selectedNode);
  if (!n) return;
  _proj.copy(n.mesh.position).project(camera);
  if (_proj.z > 1) { hideConnector(); return; }
  const nx = (_proj.x * 0.5 + 0.5) * innerWidth;
  const ny = (-_proj.y * 0.5 + 0.5) * innerHeight;
  const panelRect = infoPanel.getBoundingClientRect();
  connectorLine.setAttribute('x1', nx); connectorLine.setAttribute('y1', ny);
  connectorLine.setAttribute('x2', panelRect.left); connectorLine.setAttribute('y2', panelRect.top + panelRect.height * 0.5);
  connectorLine.setAttribute('display', '');
  connectorDot.setAttribute('cx', nx); connectorDot.setAttribute('cy', ny);
  connectorDot.setAttribute('display', '');
}

function highlightNode(nodeId) {
  if (hoveredNode === nodeId) {
    if (nodeId && nodeId !== selectedNode && gazeTarget === nodeId) {
      if (performance.now() - gazeStart >= GAZE_DWELL_MS) {
        selectedNode = nodeId;
        showInfo(nodeId);
      }
    }
    return;
  }
  if (hoveredNode) {
    const prev = nodeMap.get(hoveredNode);
    if (prev) {
      prev.mesh.material.emissiveIntensity = 1.5;
      prev.glow.material.opacity = 0.6;
    }
  }
  hoveredNode = nodeId;
  gazeTarget = nodeId;
  gazeStart = performance.now();
  if (nodeId) {
    const n = nodeMap.get(nodeId);
    n.mesh.material.emissiveIntensity = 3.0;
    n.glow.material.opacity = 1.0;
    if (!selectedNode) showInfo(nodeId);
  } else if (!selectedNode) {
    hideInfo();
  }
}

let pointerDownPos = null;
window.addEventListener('pointerdown', (e) => { pointerDownPos = { x: e.clientX, y: e.clientY }; });
window.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
});

function findNearestNode(screenX, screenY, maxDist) {
  let best = null, bestD = maxDist * maxDist;
  for (const n of nodeMap.values()) {
    if (!n.mesh.visible) continue;
    _proj.copy(n.mesh.position).project(camera);
    if (_proj.z > 1) continue; // behind camera
    const sx = (_proj.x * 0.5 + 0.5) * innerWidth;
    const sy = (-_proj.y * 0.5 + 0.5) * innerHeight;
    const d = (sx - screenX) ** 2 + (sy - screenY) ** 2;
    if (d < bestD) { bestD = d; best = n.id; }
  }
  return best;
}

window.addEventListener('click', (e) => {
  if (pointerDownPos) {
    const dx = e.clientX - pointerDownPos.x, dy = e.clientY - pointerDownPos.y;
    if (dx * dx + dy * dy > 25) return; // was a drag, not a click
  }
  const target = hoveredNode || findNearestNode(e.clientX, e.clientY, 80);
  if (target) {
    if (selectedNode === target) {
      selectedNode = null;
      hideInfo();
    } else {
      selectedNode = target;
      highlightNode(target);
      showInfo(target);
    }
  } else {
    selectedNode = null;
    hideInfo();
  }
});

window.addEventListener('dblclick', () => {
  // Check network stars first
  raycaster.setFromCamera(pointer, camera);
  const starMeshes = networkStars.map(s => s.mesh);
  const starHits = raycaster.intersectObjects(starMeshes, false);
  if (starHits.length > 0) {
    const net = starHits[0].object.userData.network;
    if (net) { hyperspaceTo(net); return; }
  }

  if (!hoveredNode) return;
  const n = nodeMap.get(hoveredNode);
  if (!n) return;
  if (n.type === 'cardano') {
    window.open('https://preview.cexplorer.io/block/' + n.cardanoHash, '_blank');
    return;
  }
  const hash = n.type === 'block' ? n.blockHash :
    n.type === 'extrinsic' ? nodeMap.get('block-' + n.blockNumber)?.blockHash : null;
  if (hash) {
    const rpcEncoded = encodeURIComponent(RPC_URL);
    window.open('https://polkadot.js.org/apps/?rpc=' + rpcEncoded + '#/explorer/query/' + hash, '_blank');
  }
});

function vrSelectNode(wasTwoHand) {
  if (wasTwoHand) return;
  if (hoveredNode) {
    if (selectedNode === hoveredNode) {
      selectedNode = null;
      hideInfo();
    } else {
      selectedNode = hoveredNode;
      showInfo(hoveredNode);
    }
  } else {
    selectedNode = null;
    hideInfo();
  }
}
controller0.addEventListener('selectend', () => { vrSelectNode(pinchState.active); });

// ═══════════════════════════════════════════
// KEYBOARD NAVIGATION (WASD / Arrow keys)
// ═══════════════════════════════════════════

const keysDown = new Set();
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  keysDown.add(e.key);
});
window.addEventListener('keyup', (e) => keysDown.delete(e.key));

const _forward = new THREE.Vector3();
const _right = new THREE.Vector3();
const _move = new THREE.Vector3();

function applyKeyboardMovement(dt) {
  const speed = (keysDown.has('Shift') ? 200 : 20) * dt;
  camera.getWorldDirection(_forward);
  _forward.y = 0;
  _forward.normalize();
  _right.crossVectors(_forward, camera.up).normalize();

  _move.set(0, 0, 0);
  if (keysDown.has('w') || keysDown.has('W') || keysDown.has('ArrowUp')) _move.add(_forward);
  if (keysDown.has('s') || keysDown.has('S') || keysDown.has('ArrowDown')) _move.sub(_forward);
  if (keysDown.has('a') || keysDown.has('A') || keysDown.has('ArrowLeft')) _move.sub(_right);
  if (keysDown.has('d') || keysDown.has('D') || keysDown.has('ArrowRight')) _move.add(_right);
  if (keysDown.has('q') || keysDown.has('Q')) _move.y += 1;
  if (keysDown.has('e') || keysDown.has('E')) _move.y -= 1;
  if (_move.lengthSq() === 0) return;
  _move.normalize().multiplyScalar(speed);
  camera.position.add(_move);
  controls.target.add(_move);
}

// ═══════════════════════════════════════════
// LEGEND FILTERS
// ═══════════════════════════════════════════

const visibleFilters = { unfinalized: true, finalized: true, extrinsic: true, event: true, cardano: true, empty: true };

function isBlockEmpty(entry) {
  const bd = blockList.find(b => b.nodeId === entry.id);
  return bd && !bd.hasLedgerTxs;
}

function getNodeFilter(entry) {
  if (entry.type === 'cardano') {
    // Hide Cardano nodes when all linked Midnight blocks are hidden
    if (!visibleFilters.empty) {
      const cb = cardanoBlocks.get(entry.cardanoHash);
      if (cb && ![...cb.referencedBy].some(num => {
        const bd = blockList.find(b => b.number === num);
        return bd && bd.hasLedgerTxs;
      })) return 'empty';
    }
    return 'cardano';
  }
  if (entry.type === 'event') return 'event';
  if (entry.type === 'extrinsic') {
    if (!visibleFilters.empty) {
      const parentBd = blockList.find(b => b.number === entry.blockNumber);
      if (parentBd && !parentBd.hasLedgerTxs) return 'empty';
    }
    return 'extrinsic';
  }
  if (entry.type === 'block') {
    if (!visibleFilters.empty && isBlockEmpty(entry)) return 'empty';
    const bd = blockList.find(b => b.nodeId === entry.id);
    return bd && bd.finalized ? 'finalized' : 'unfinalized';
  }
  return null;
}

function applyFilters() {
  for (const [id, entry] of nodeMap) {
    const filter = getNodeFilter(entry);
    const visible = filter ? visibleFilters[filter] : true;
    entry.mesh.visible = visible;
  }
  // Reposition visible blocks compactly, then rebuild edges
  repositionBlocks();
  repositionCardanoBlocks();
  rebuildAllEdges();
  forceSettleSteps = 150;
}

document.querySelectorAll('#legend input[data-filter]').forEach(cb => {
  cb.addEventListener('change', () => {
    visibleFilters[cb.dataset.filter] = cb.checked;
    applyFilters();
  });
});

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════

const clock = new THREE.Clock();
const dummy = new THREE.Object3D();
const _camQuat = new THREE.Quaternion();
const _parentQuat = new THREE.Quaternion();
const _a = new THREE.Vector3();
const _b = new THREE.Vector3();
const _tempMatrix = new THREE.Matrix4();
const _rayDir = new THREE.Vector3(Math.sin(RAY_PITCH), 0, -Math.cos(RAY_PITCH));

function animate() {
  const t = clock.getElapsedTime();

  if (forceSettleSteps > 0) {
    forceStep();
    forceSettleSteps--;
  }

  for (const n of nodeMap.values()) {
    n.mesh.position.copy(n.pos);
    n.mesh.position.y += Math.sin(t * 0.15 + n.phase) * 0.04;
    n.mesh.rotation.y = t * 0.08 + n.phase;
    n.mesh.rotation.x = Math.sin(t * 0.1 + n.phase) * 0.05;
    n.glow.material.opacity = 0.5 + 0.15 * Math.sin(t * 1.5 + n.phase);
  }

  camera.getWorldQuaternion(_camQuat);
  for (const { label, mesh } of labelEntries) {
    mesh.getWorldQuaternion(_parentQuat).invert();
    label.quaternion.copy(_camQuat).premultiply(_parentQuat);
  }

  for (const e of edgeData) {
    const pa = e.geo.attributes.position.array;
    const sp = e.src.mesh.position, tp = e.tgt.mesh.position;
    pa[0] = sp.x; pa[1] = sp.y; pa[2] = sp.z;
    pa[3] = tp.x; pa[4] = tp.y; pa[5] = tp.z;
    e.geo.attributes.position.needsUpdate = true;
    e.line.material.opacity = 0.25 + 0.1 * Math.sin(t * 2 + e.phaseOffsets[0] * 10);
  }

  let idx = 0;
  for (const e of edgeData) {
    _a.copy(e.src.mesh.position);
    _b.copy(e.tgt.mesh.position);
    for (let p = 0; p < PARTICLES_PER_EDGE; p++) {
      if (idx >= MAX_PARTICLES) break;
      const phase = ((t * e.speed + e.phaseOffsets[p]) % 1 + 1) % 1;
      dummy.position.lerpVectors(_a, _b, phase);
      dummy.scale.setScalar(0.4 + 0.6 * Math.sin(phase * Math.PI));
      dummy.updateMatrix();
      particles.setMatrixAt(idx, dummy.matrix);
      idx++;
    }
  }
  particles.instanceMatrix.needsUpdate = true;

  // Pulse network stars
  for (const ns of networkStars) {
    const isCurrent = ns.net === currentNetwork;
    const pulse = 0.15 * Math.sin(t * (isCurrent ? 1.5 : 0.8) + hashStr(ns.net.name));
    ns.glow.material.opacity = (isCurrent ? 0.9 : 0.5) + pulse;
    ns.mesh.rotation.y = t * 0.2;
  }

  if (!renderer.xr.isPresenting) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(nodeMeshes, false);
    if (hits.length > 0) {
      highlightNode(hits[0].object.userData.nodeId);
      document.body.style.cursor = 'pointer';
    } else {
      if (!selectedNode) highlightNode(null);
      document.body.style.cursor = 'default';
    }
    applyKeyboardMovement(1 / 60);
    controls.update();
    if (composer) composer.render(); else renderer.render(scene, camera);
    updateConnector();
  } else {
    const session = renderer.xr.getSession();
    const sources = session ? session.inputSources : [];
    const selectingSources = [];
    for (const src of sources) {
      if (src.gamepad && src.gamepad.buttons.length > 0 && src.gamepad.buttons[0].pressed) {
        selectingSources.push(src);
      }
    }
    const twoHands = selectingSources.length >= 2 ||
      (controller0.userData.selecting && controller1.userData.selecting);
    if (twoHands) {
      controller0.getWorldPosition(_c0Pos);
      controller1.getWorldPosition(_c1Pos);
      if (!pinchState.active) {
        pinchState.startDist = _c0Pos.distanceTo(_c1Pos);
        pinchState.startScale = graphGroup.scale.x;
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        pinchState.startMid.copy(_midPos);
        pinchState.startGroupPos.copy(graphGroup.position);
        pinchState.active = pinchState.startDist > 0.01;
      } else {
        const curDist = _c0Pos.distanceTo(_c1Pos);
        const scale = Math.min(Math.max(pinchState.startScale * (curDist / pinchState.startDist), 0.2), 5);
        graphGroup.scale.setScalar(scale);
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        _a.copy(_midPos).sub(pinchState.startMid);
        graphGroup.position.copy(pinchState.startGroupPos).add(_a);
      }
    } else {
      pinchState.active = false;
    }

    let bestHit = null;
    for (const ctrl of [controller0, controller1]) {
      _tempMatrix.identity().extractRotation(ctrl.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
      raycaster.ray.direction.copy(_rayDir).applyMatrix4(_tempMatrix);
      const hits = raycaster.intersectObjects(nodeMeshes, false);
      if (hits.length > 0 && (!bestHit || hits[0].distance < bestHit.distance)) {
        bestHit = hits[0];
      }
    }
    if (bestHit) {
      highlightNode(bestHit.object.userData.nodeId);
    } else {
      if (!selectedNode) highlightNode(null);
    }
    if (vrInfoText.visible && selectedNode) {
      const sn = nodeMap.get(selectedNode);
      if (sn) {
        sn.mesh.getWorldPosition(vrInfoText.position);
        vrInfoText.position.x += sn.size * 0.5 + 0.4;
        vrInfoText.position.y += sn.size * 0.3;
        vrInfoText.quaternion.copy(camera.quaternion);
      }
    }
    renderer.render(scene, camera);
  }
}

renderer.setAnimationLoop(animate);

// ═══════════════════════════════════════════
// BACKWARD SCANNER — find historical blocks with ledger txs
// ═══════════════════════════════════════════

// Batch-check up to 50 blocks in a single GraphQL request using aliases
async function batchCheckBlocks(heights) {
  const aliases = heights.map((h, i) =>
    `b${i}: block(offset: { height: ${h} }) { height transactions { __typename } }`
  );
  const resp = await fetch(INDEXER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: `{ ${aliases.join(' ')} }` }),
  });
  const json = await resp.json();
  if (json.errors) return [];
  const hits = [];
  for (const v of Object.values(json.data || {})) {
    if (v && v.transactions.some(t => t.__typename === 'RegularTransaction')) {
      hits.push(v.height);
    }
  }
  return hits;
}

async function scanBackward(startHeight) {
  const controller = new AbortController();
  scannerAbort = controller;
  const BATCH_SIZE = 50;  // blocks per GraphQL query
  const PARALLEL = 10;    // concurrent queries
  const stride = BATCH_SIZE * PARALLEL; // 500 blocks per round
  let totalFound = 0;

  const MAX_TX_BLOCKS = 100;
  console.log('Scanner: scanning backward from', startHeight, '(max', MAX_TX_BLOCKS, 'tx blocks)');

  for (let h = startHeight; h >= 1 && !controller.signal.aborted && totalFound < MAX_TX_BLOCKS; h -= stride) {
    // Build parallel batches covering [h-stride+1 .. h]
    const promises = [];
    for (let p = 0; p < PARALLEL; p++) {
      const batchStart = h - p * BATCH_SIZE;
      const heights = [];
      for (let i = 0; i < BATCH_SIZE; i++) {
        const bh = batchStart - i;
        if (bh >= 1) heights.push(bh);
      }
      if (heights.length > 0) {
        promises.push(batchCheckBlocks(heights).catch(() => []));
      }
    }
    const results = await Promise.all(promises);
    const roundHits = results.flat();

    // Fetch and add discovered blocks immediately (progressive display)
    for (const height of roundHits) {
      if (controller.signal.aborted) break;
      const existing = blockList.find(b => b.number === height);
      if (existing) {
        existing.hasLedgerTxs = true;
        continue;
      }
      try {
        const hash = await rpcCall('chain_getBlockHash', [height]);
        const block = await rpcCall('chain_getBlock', [hash]);
        addBlock(height, hash, block.block.extrinsics, block.block.header.digest.logs, true);
        totalFound++;
      } catch (e) {
        console.warn('Scanner: block', height, 'fetch failed:', e);
      }
    }
    if (roundHits.length > 0) applyFilters();
  }
  console.log('Scanner: complete, found', totalFound, 'blocks with ledger txs');
}

// ═══════════════════════════════════════════
// RPC CONNECTION
// ═══════════════════════════════════════════

function connectRpc() {
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = 'Connecting...';

  ws = new WebSocket(RPC_URL);
  ws.onopen = async () => {
    subtitle.textContent = 'Connected, subscribing...';
    try {
      chainName = await rpcCall('system_chain');

      // Fetch and parse runtime metadata for extrinsic type decoding
      try {
        const metaHex = await rpcCall('state_getMetadata');
        palletInfo = parseMetadata(metaHex);
      } catch (e) {
        console.warn('Metadata fetch failed:', e);
      }

      // Subscribe to new (unfinalized) heads
      await rpcCall('chain_subscribeNewHeads');

      // Subscribe to finalized heads
      await rpcCall('chain_subscribeFinalizedHeads');

      subtitle.textContent = chainName + ' // waiting for blocks...';

      // Start backward scan for historical blocks with ledger transactions
      rpcCall('chain_getHeader').then(header => {
        const headNumber = parseInt(header.number, 16);
        scanBackward(headNumber).catch(e => console.warn('Scanner error:', e));
      });
    } catch (e) {
      console.error('Setup error:', e);
      subtitle.textContent = 'Error: ' + e.message;
    }
  };

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    // RPC response
    if (msg.id != null && rpcCallbacks.has(msg.id)) {
      const cb = rpcCallbacks.get(msg.id);
      clearTimeout(cb.timer);
      rpcCallbacks.delete(msg.id);
      if (msg.error) cb.reject(msg.error);
      else cb.resolve(msg.result);
      return;
    }

    // Subscription notifications
    if (msg.params && msg.params.result) {
      const header = msg.params.result;
      const number = parseInt(header.number, 16);

      if (msg.method === 'chain_newHead') {
        try {
          const hash = await rpcCall('chain_getBlockHash', [number]);
          const block = await rpcCall('chain_getBlock', [hash]);
          addBlock(number, hash, block.block.extrinsics, block.block.header.digest.logs);
          updateSubtitle();
        } catch (e) {
          console.error('Failed to fetch block', number, e);
        }
      } else if (msg.method === 'chain_finalizedHead') {
        finalizeUpTo(number);
      }
    }
  };

  ws.onerror = () => {
    subtitle.textContent = 'Connection error, retrying...';
  };
  ws.onclose = () => {
    if (scannerAbort) scannerAbort.abort();
    setTimeout(connectRpc, 5000);
  };
}

connectRpc();

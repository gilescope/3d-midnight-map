// ═══════════════════════════════════════════
// SCALE DECODER (minimal, for metadata + extrinsics)
// ═══════════════════════════════════════════

class ScaleReader {
  constructor(hex) {
    const h = hex.startsWith('0x') ? hex.slice(2) : hex;
    this.b = new Uint8Array(h.length / 2);
    for (let i = 0; i < this.b.length; i++) this.b[i] = parseInt(h.substr(i * 2, 2), 16);
    this.o = 0;
  }
  u8() { return this.b[this.o++]; }
  u32() {
    const v = this.b[this.o] | (this.b[this.o+1] << 8) | (this.b[this.o+2] << 16) | (this.b[this.o+3] << 24);
    this.o += 4; return v >>> 0;
  }
  compact() {
    const f = this.b[this.o], m = f & 3;
    if (m === 0) { this.o++; return f >> 2; }
    if (m === 1) { const v = (this.b[this.o] | (this.b[this.o+1] << 8)) >> 2; this.o += 2; return v; }
    if (m === 2) { const v = (this.b[this.o] | (this.b[this.o+1] << 8) | (this.b[this.o+2] << 16) | (this.b[this.o+3] << 24)) >> 2; this.o += 4; return v >>> 0; }
    const len = (f >> 2) + 4; this.o += 1 + len; return 0;
  }
  str() { const n = this.compact(); const s = new TextDecoder().decode(this.b.subarray(this.o, this.o + n)); this.o += n; return s; }
  skip(n) { this.o += n; }
  vec(fn) { const n = this.compact(), r = []; for (let i = 0; i < n; i++) r.push(fn()); return r; }
  opt(fn) { return this.u8() ? fn() : null; }
  bytes() { const n = this.compact(); this.o += n; }
}

function parseMetadata(hex) {
  try {
    const r = new ScaleReader(hex);
    r.skip(4); // "meta" magic
    const ver = r.u8();
    if (ver !== 14 && ver !== 15) return null;
    // Types registry: Vec<PortableType>
    // Note: all type refs (UntrackedSymbol) use compact encoding
    const variantTypes = {};
    const skipFields = () => r.vec(() => { r.opt(() => r.str()); r.compact(); r.opt(() => r.str()); r.vec(() => r.str()); });
    r.vec(() => {
      const id = r.compact();
      r.vec(() => r.str()); // path
      r.vec(() => { r.str(); r.opt(() => r.compact()); }); // type_params
      const def = r.u8();
      let variants = null;
      if (def === 0) skipFields(); // Composite
      else if (def === 1) { // Variant
        variants = r.vec(() => {
          const name = r.str(); skipFields(); const idx = r.u8(); r.vec(() => r.str());
          return { name, index: idx };
        });
      }
      else if (def === 2) r.compact(); // Sequence
      else if (def === 3) { r.u32(); r.compact(); } // Array: len(u32) + type(compact)
      else if (def === 4) r.vec(() => r.compact()); // Tuple
      else if (def === 5) r.u8(); // Primitive
      else if (def === 6) r.compact(); // Compact
      else if (def === 7) { r.compact(); r.compact(); } // BitSequence
      r.vec(() => r.str()); // docs
      if (variants) variantTypes[id] = variants;
    });
    // Pallets: Vec<PalletMetadata>
    const pallets = {};
    r.vec(() => {
      const name = r.str();
      r.opt(() => { r.str(); r.vec(() => { r.str(); r.u8(); const st = r.u8(); if (st === 0) r.compact(); else { r.vec(() => r.u8()); r.compact(); r.compact(); } r.bytes(); r.vec(() => r.str()); }); }); // storage
      const callTy = r.opt(() => r.compact());
      r.opt(() => r.compact()); // event
      r.vec(() => { // constants
        const cName = r.str(); r.compact();
        const cLen = r.compact();
        if (name === 'System' && cName === 'BlockLength' && cLen >= 4) {
          maxBlockBytes = r.b[r.o] | (r.b[r.o+1] << 8) | (r.b[r.o+2] << 16) | (r.b[r.o+3] << 24);
          console.log('BlockLength normal:', maxBlockBytes);
        }
        r.skip(cLen);
        r.vec(() => r.str());
      });
      r.opt(() => r.compact()); // error
      const index = r.u8();
      let calls = null;
      if (callTy !== null && variantTypes[callTy]) {
        calls = {};
        for (const v of variantTypes[callTy]) calls[v.index] = v.name;
      }
      pallets[index] = { name, calls };
    });
    console.log('Parsed metadata:', Object.keys(pallets).length, 'pallets');
    return pallets;
  } catch (e) {
    console.error('Metadata parse error:', e);
    return null;
  }
}

function decodeExtrinsicCall(extHex) {
  try {
    const r = new ScaleReader(extHex);
    r.compact(); // length prefix
    const ver = r.u8();
    const signed = (ver & 0x80) !== 0;
    if (signed) {
      const addrKind = r.u8();
      if (addrKind === 0) r.skip(32); else return null;
      const sigKind = r.u8();
      if (sigKind <= 1) r.skip(64); else if (sigKind === 2) r.skip(65); else return null;
      // Signed extensions (common Substrate: Era + compact nonce + compact tip)
      const era = r.u8();
      if (era !== 0) r.u8(); // mortal era = 2 bytes
      r.compact(); // nonce
      r.compact(); // tip
    }
    const palletIndex = r.u8();
    const callIndex = r.u8();
    // Validate against known pallets
    if (palletInfo && !palletInfo[palletIndex]) return null;
    return { palletIndex, callIndex };
  } catch (e) {
    return null;
  }
}

function formatCallName(extHex) {
  if (!palletInfo) return null;
  const call = decodeExtrinsicCall(extHex);
  if (!call) return null;
  const pallet = palletInfo[call.palletIndex];
  if (!pallet) return null;
  const callName = pallet.calls ? pallet.calls[call.callIndex] : null;
  return pallet.name + '.' + (callName || call.callIndex);
}

// Indexer: fetch ledger transaction fees for a block
async function fetchBlockFees(blockHeight) {
  try {
    const query = `{ block(offset: { height: ${blockHeight} }) { transactions { hash ... on RegularTransaction { fees { paidFees estimatedFees } transactionResult { status } } } } }`;
    const resp = await fetch(INDEXER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const json = await resp.json();
    const txs = json?.data?.block?.transactions || [];
    const regular = txs.filter(t => t.fees);
    if (regular.length === 0) return null;
    const totalPaid = regular.reduce((s, t) => s + BigInt(t.fees.paidFees), 0n);
    const totalEstimated = regular.reduce((s, t) => s + BigInt(t.fees.estimatedFees), 0n);
    return { txCount: regular.length, totalPaid, totalEstimated, txs: regular };
  } catch { return null; }
}

function formatDust(val) {

// Block tracking: ordered newest-first
const blockList = [];

// Cardano block tracking
const cardanoBlocks = new Map();
const cardanoBlockList = [];

function parseMcshDigest(digestLogs) {
  const MCSH = '6d637368';
  for (const log of digestLogs) {
    const hex = log.startsWith('0x') ? log.slice(2) : log;
    if (hex.length >= 76 && hex.slice(0, 2) === '06' && hex.slice(2, 10) === MCSH) {
      return hex.slice(12, 76);
    }
  }
  return null;
}

function getOrCreateCardanoNode(hash) {
  if (cardanoBlocks.has(hash)) return cardanoBlocks.get(hash);
  const nodeId = 'cardano-' + hash.slice(0, 16);
  const cb = { hash, nodeId, referencedBy: new Set() };
  cardanoBlocks.set(hash, cb);
  const pos = new THREE.Vector3(0, CARDANO_Y_OFFSET, 0);
  addNode(nodeId, shortHash(hash), COLORS.cardano, HEX.cardano, 1.0, pos, {
    type: 'cardano', cardanoHash: hash,
  });
  cardanoBlockList.push(cb);
  repositionCardanoBlocks();
  updateSubtitle();
  return cb;
}

function rpcCall(method, params = []) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject(new Error('Not connected'));
      return;
    }
    const id = ++rpcId;
    const timer = setTimeout(() => {
      rpcCallbacks.delete(id);
      reject(new Error('Timeout'));
    }, 10000);
    rpcCallbacks.set(id, { resolve, reject, timer });
    ws.send(JSON.stringify({ jsonrpc: '2.0', id, method, params }));
  });
}

function shortHash(h) {
  if (!h) return '???';
  return h.slice(0, 10) + '...' + h.slice(-6);
}

// ═══════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
// TEXTURES
// ═══════════════════════════════════════════

function makeGlowTexture() {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
}

const glowTex = makeGlowTexture();

// ═══════════════════════════════════════════
// DYNAMIC GRAPH
// ═══════════════════════════════════════════

const nodeMap = new Map();
const nodeMeshes = [];
const labelEntries = [];
const edgeData = [];
const graphGroup = new THREE.Group();
scene.add(graphGroup);
const edgeGroup = new THREE.Group();
graphGroup.add(edgeGroup);

const PARTICLES_PER_EDGE = 3;
const MAX_PARTICLES = 500 * PARTICLES_PER_EDGE;
const pGeo = new THREE.SphereGeometry(0.06, 6, 6);
const pMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.InstancedMesh(pGeo, pMat, MAX_PARTICLES);
particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
particles.count = 0;
graphGroup.add(particles);

function addNode(id, label, color, hex, size, pos, extraData) {
  if (nodeMap.has(id)) return;
  const sz = size || 1;

  const geo = new THREE.IcosahedronGeometry(sz * 0.5, sz > 1.3 ? 1 : 0);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 1.5,
    metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  graphGroup.add(mesh);

  const glowMaterial = new THREE.SpriteMaterial({
    map: glowTex, color,
    transparent: true, opacity: 0.6,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMaterial);
  glow.scale.setScalar(sz * 3);
  mesh.add(glow);

  const textLabel = new Text();
  textLabel.text = label;
  textLabel.fontSize = sz > 1 ? 0.32 : 0.22;
  textLabel.color = hex;
  textLabel.anchorX = 'center';
  textLabel.anchorY = 'bottom';
  textLabel.position.y = sz * 0.5 + 0.4;
  textLabel.outlineWidth = '8%';
  textLabel.outlineColor = 0x000000;
  textLabel.outlineOpacity = 0.6;
  textLabel.depthOffset = -1;
  textLabel.font = ORBITRON_URL;
  textLabel.sync();
  mesh.add(textLabel);
  labelEntries.push({ label: textLabel, mesh });

  const entry = {
    id, label, size: sz, pos, vel: new THREE.Vector3(),
    mesh, glow, phase: Math.random() * Math.PI * 2,
    color, hex, ...extraData,
  };
  nodeMap.set(id, entry);
  nodeMeshes.push(mesh);
  mesh.userData = { nodeId: id };
}

function removeNode(id) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  graphGroup.remove(entry.mesh);
  entry.mesh.geometry.dispose();
  entry.mesh.material.dispose();
  nodeMap.delete(id);
  const mi = nodeMeshes.indexOf(entry.mesh);
  if (mi >= 0) nodeMeshes.splice(mi, 1);
  const li = labelEntries.findIndex(e => e.mesh === entry.mesh);
  if (li >= 0) labelEntries.splice(li, 1);
}

function setNodeColor(id, color, hex) {
  const entry = nodeMap.get(id);
  if (!entry) return;
  entry.color = color;
  entry.hex = hex;
  entry.mesh.material.color.copy(color);
  entry.mesh.material.emissive.copy(color);
  entry.glow.material.color.copy(color);
  // Update label color
  const li = labelEntries.find(e => e.mesh === entry.mesh);
  if (li) li.label.color = hex;
}

function rebuildEdges() {
  for (const e of edgeData) {
    edgeGroup.remove(e.line);
    e.geo.dispose();
    e.line.material.dispose();
  }
  edgeData.length = 0;

  for (const [srcId, tgtId] of edges) {
    const src = nodeMap.get(srcId), tgt = nodeMap.get(tgtId);
    if (!src || !tgt) continue;
    if (!src.mesh.visible || !tgt.mesh.visible) continue;
    const srcColor = src.color || COLORS.block;
    const tgtColor = tgt.color || COLORS.block;

    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    const colors = new Float32Array(6);
    srcColor.toArray(colors, 0);
    tgtColor.toArray(colors, 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const mat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.35,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);

    edgeData.push({
      src, tgt, line, geo,
      speed: 0.2 + Math.random() * 0.3,
      phaseOffsets: [Math.random(), Math.random(), Math.random()],
    });
  }
  particles.count = Math.min(edgeData.length * PARTICLES_PER_EDGE, MAX_PARTICLES);
}

// ═══════════════════════════════════════════
// BLOCK GRAPH MANAGEMENT
// ═══════════════════════════════════════════

function addBlock(number, hash, extrinsics, digestLogs, hasLedgerTxs = false) {
  // Don't add duplicates
  if (blockList.find(b => b.number === number)) return;

  const blockId = 'block-' + number;
  const extNodeIds = [];
  const extCount = extrinsics.length;
  const blockSize = 1.2 + Math.min(extCount * 0.1, 0.8);
  const totalBytes = extrinsics.reduce((sum, hex) => sum + (hex.length - 2) / 2, 0);

  // Block position: newest at x=0, will be shifted
  const pos = new THREE.Vector3(0, 0, 0);
  addNode(blockId, '#' + number, COLORS.block, HEX.block, blockSize, pos, {
    type: 'block', blockNumber: number, blockHash: hash, extCount, totalBytes,
  });

  // Extrinsic nodes
  for (let i = 0; i < extCount; i++) {
    const extId = 'ext-' + number + '-' + i;
    const extHex = extrinsics[i];
    const extBytes = (extHex.length - 2) / 2;
    const angle = (i / extCount) * Math.PI * 2;
    const radius = 2 + Math.random();
    const extPos = new THREE.Vector3(
      radius * Math.cos(angle),
      radius * Math.sin(angle),
      (Math.random() - 0.5) * 2
    );
    const callName = formatCallName(extHex);
    addNode(extId, callName || ('Ext ' + i), COLORS.extrinsic, HEX.extrinsic, 0.4, extPos, {
      type: 'extrinsic', extIndex: i, extBytes, extHex, blockNumber: number, callName,
    });
    extNodeIds.push(extId);
  }

  const bd = { number, hash, extrinsics, finalized: false, nodeId: blockId, extNodeIds, hasLedgerTxs };
  // Insert sorted by block number (descending)
  const insertIdx = blockList.findIndex(b => b.number < number);
  if (insertIdx === -1) blockList.push(bd);
  else blockList.splice(insertIdx, 0, bd);
  console.log('Blocks:', blockList.length, 'Nodes:', nodeMap.size, 'Block:', number);

  // Check if already finalized
  if (number <= lastFinalizedNumber) {
    bd.finalized = true;
    setNodeColor(blockId, COLORS.finalized, HEX.finalized);
    for (const eid of extNodeIds) setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
  }

  // Parse mcsh digest for Cardano block reference
  if (digestLogs) {
    const mcshHash = parseMcshDigest(digestLogs);
    if (mcshHash) {
      bd.cardanoHash = mcshHash;
      const cb = getOrCreateCardanoNode(mcshHash);
      cb.referencedBy.add(number);
      bd.cardanoNodeId = cb.nodeId;
    }
  }

  // Fetch fee data from indexer (async, non-blocking)
  fetchBlockFees(number).then(feeData => {
    if (feeData) {
      bd.feeData = feeData;
      bd.hasLedgerTxs = true;
      const entry = nodeMap.get(blockId);
      if (entry) entry.feeData = feeData;
      if (!visibleFilters.empty) applyFilters();
      if (selectedNode === blockId) showInfo(blockId);
    }
  });

  // Reposition all blocks along X axis
  repositionBlocks();
  applyFilters();
  forceSettleSteps = 150;
}

function repositionBlocks() {
  let visIdx = 0;
  for (let i = 0; i < blockList.length; i++) {
    const bd = blockList[i];
    const entry = nodeMap.get(bd.nodeId);
    if (!entry) continue;
    if (!entry.mesh.visible) { entry.targetX = undefined; continue; }
    const targetX = -visIdx * BLOCK_SPACING;
    entry.targetX = targetX;
    visIdx++;
    // Set initial position for new nodes
    if (i === 0 && Math.abs(entry.pos.x) < 0.01 && Math.abs(entry.pos.y) < 0.01) {
      entry.pos.x = targetX;
    }
    // Position extrinsics relative to block
    for (let j = 0; j < bd.extNodeIds.length; j++) {
      const extEntry = nodeMap.get(bd.extNodeIds[j]);
      if (!extEntry) continue;
      extEntry.parentBlockId = bd.nodeId;
      // Offset extrinsic position from block
      if (extEntry.pos.length() < 3) {
        const angle = (j / bd.extNodeIds.length) * Math.PI * 2;
        const r = 2.5 + Math.random() * 0.5;
        extEntry.pos.x = targetX + r * Math.cos(angle);
        extEntry.pos.y = r * Math.sin(angle);
        extEntry.pos.z = (Math.random() - 0.5) * 2;
      }
    }
  }
}

function repositionCardanoBlocks() {
  for (let i = 0; i < cardanoBlockList.length; i++) {
    const cb = cardanoBlockList[i];
    const entry = nodeMap.get(cb.nodeId);
    if (!entry) continue;
    entry.targetX = -i * BLOCK_SPACING;
    entry.targetY = CARDANO_Y_OFFSET;
  }
}

function rebuildAllEdges() {
  edges = [];
  // Chain links between visible consecutive blocks
  let prevVisible = null;
  for (let i = 0; i < blockList.length; i++) {
    const entry = nodeMap.get(blockList[i].nodeId);
    if (entry && entry.mesh.visible) {
      if (prevVisible !== null) edges.push([prevVisible, blockList[i].nodeId]);
      prevVisible = blockList[i].nodeId;
    }
  }
  // Block -> extrinsic links
  for (const bd of blockList) {
    for (const eid of bd.extNodeIds) {
      edges.push([bd.nodeId, eid]);
    }
    // Cross-chain link: Midnight block -> Cardano block
    if (bd.cardanoNodeId) {
      edges.push([bd.nodeId, bd.cardanoNodeId]);
    }
  }
  // Cardano chain links (between visible nodes)
  let prevCardano = null;
  for (let i = 0; i < cardanoBlockList.length; i++) {
    const entry = nodeMap.get(cardanoBlockList[i].nodeId);
    if (entry && entry.mesh.visible) {
      if (prevCardano !== null) edges.push([prevCardano, cardanoBlockList[i].nodeId]);
      prevCardano = cardanoBlockList[i].nodeId;
    }
  }
  rebuildEdges();
}

function finalizeUpTo(number) {
  lastFinalizedNumber = number;
  for (const bd of blockList) {
    if (bd.number <= number && !bd.finalized) {
      bd.finalized = true;
      setNodeColor(bd.nodeId, COLORS.finalized, HEX.finalized);
      for (const eid of bd.extNodeIds) {
        setNodeColor(eid, COLORS.extFinal, HEX.extFinal);
      }
    }
  }
  applyFilters();
  updateSubtitle();
}

    ' // finalized: #' + lastFinalizedNumber +
    ' // blocks: ' + blockList.length +
    ' // cardano: ' + cardanoBlockList.length +
    ' // nodes: ' + nodeMap.size;
}

function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = radius * (0.3 + Math.random() * 0.7);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i+2] = r * Math.cos(phi);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  return geo;
}

// ═══════════════════════════════════════════
// FORCE LAYOUT
// ═══════════════════════════════════════════

let forceSettleSteps = 0;
const repulsion = 15, attraction = 0.03, damping = 0.92, minDist = 0.5;
const _diff = new THREE.Vector3();

function forceStep() {
  const allNodes = [...nodeMap.values()].filter(n => n.mesh.visible);

  // Repulsion between all nodes
  for (let i = 0; i < allNodes.length; i++) {
    for (let j = i + 1; j < allNodes.length; j++) {
      const a = allNodes[i], b = allNodes[j];
      _diff.subVectors(a.pos, b.pos);
      const d = Math.max(_diff.length(), minDist);
      const f = repulsion / (d * d);
      _diff.normalize().multiplyScalar(f);
      a.vel.add(_diff);
      b.vel.sub(_diff);
    }
  }

  // Attraction along edges
  for (const [srcId, tgtId] of edges) {
    const s = nodeMap.get(srcId), t = nodeMap.get(tgtId);
    if (!s || !t || !s.mesh.visible || !t.mesh.visible) continue;
    _diff.subVectors(t.pos, s.pos);
    const d = _diff.length();
    const crossChain = (s.type === 'block' && t.type === 'cardano') || (s.type === 'cardano' && t.type === 'block');
    const chainLink = (s.type === 'block' && t.type === 'block') || (s.type === 'cardano' && t.type === 'cardano');
    const rest = chainLink ? BLOCK_SPACING : crossChain ? Math.abs(CARDANO_Y_OFFSET) : 2.5;
    const f = attraction * (d - rest);
    _diff.normalize().multiplyScalar(f);
    s.vel.add(_diff);
    t.vel.sub(_diff);
  }

  // Block positioning force: pull blocks toward their target X, center Y/Z
  for (const n of allNodes) {
    if (n.targetX !== undefined) {
      n.vel.x += (n.targetX - n.pos.x) * 0.05;
      n.vel.y += ((n.targetY !== undefined ? n.targetY : 0) - n.pos.y) * 0.01;
      n.vel.z += (0 - n.pos.z) * 0.01;
    }
    n.vel.multiplyScalar(damping);
    n.pos.add(n.vel);
  }
}

function showInfo(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  const hex = n.hex || '#00fff2';

  let title = '', layerName = '', desc = '';

  if (n.type === 'block') {
    const bd = blockList.find(b => b.nodeId === nodeId);
    title = 'Midnight Block #' + n.blockNumber;
    layerName = bd && bd.finalized ? 'Finalized' : 'Unfinalized';
    const fullness = (n.totalBytes / maxBlockBytes * 100).toFixed(2);
    const feeInfo = n.feeData
      ? '\nLedger Txs: ' + n.feeData.txCount + ' (fees: ' + formatDust(n.feeData.totalPaid) + ')'
      : '';
    desc = 'Hash: ' + shortHash(n.blockHash) +
      '\nExtrinsics: ' + n.extCount +
      '\nSize: ' + n.totalBytes.toLocaleString() + ' / ' + maxBlockBytes.toLocaleString() + ' bytes (' + fullness + '%)' +
      '\nStatus: ' + layerName +
      feeInfo +
      (bd && bd.cardanoHash ? '\nCardano: ' + shortHash(bd.cardanoHash) : '');
  } else if (n.type === 'extrinsic') {
    const pct = (n.extBytes / maxBlockBytes * 100).toFixed(2) + '%';
    title = n.callName || ('Extrinsic ' + n.extIndex);
    layerName = 'Block #' + n.blockNumber;
    desc = 'Size: ' + n.extBytes.toLocaleString() + ' bytes' +
      '\nBlock capacity: ' + pct +
      (n.callName ? '' : '\nData: ' + (n.extHex ? n.extHex.slice(0, 40) + '...' : '?'));
  } else if (n.type === 'cardano') {
    title = 'Cardano Block';
    layerName = 'Partner Chain';
    desc = 'Hash: ' + shortHash(n.cardanoHash);
  }

  infoTitle.textContent = title;
  infoTitle.style.color = hex;
  infoLayer.textContent = layerName;
  infoLayer.style.color = hex;
  infoDesc.textContent = desc;
  infoConns.textContent = '';
  infoPanel.style.display = 'block';
  infoPanel.style.borderColor = hex + '44';

  if (renderer.xr.isPresenting) {
    vrInfoText.text = title + '\n' + layerName + '\n\n' + desc;
    vrInfoText.color = hex;
    vrInfoText.visible = true;
    vrInfoText.sync();
  }
}

function hideInfo() {

function highlightNode(nodeId) {
  if (hoveredNode === nodeId) {
    if (nodeId && nodeId !== selectedNode && gazeTarget === nodeId) {
      if (performance.now() - gazeStart >= GAZE_DWELL_MS) {
        selectedNode = nodeId;
        showInfo(nodeId);
      }
    }
    return;
  }
  if (hoveredNode) {
    const prev = nodeMap.get(hoveredNode);
    if (prev) {
      prev.mesh.material.emissiveIntensity = 1.5;
      prev.glow.material.opacity = 0.6;
    }
  }
  hoveredNode = nodeId;
  gazeTarget = nodeId;
  gazeStart = performance.now();
  if (nodeId) {
    const n = nodeMap.get(nodeId);
    n.mesh.material.emissiveIntensity = 3.0;
    n.glow.material.opacity = 1.0;
    showInfo(nodeId);
  } else if (!selectedNode) {
    hideInfo();
  }
}

const keysDown = new Set();
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  keysDown.add(e.key);
});
window.addEventListener('keyup', (e) => keysDown.delete(e.key));

function applyKeyboardMovement(dt) {
  const speed = 20 * dt;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

  const move = new THREE.Vector3();
  if (keysDown.has('w') || keysDown.has('W') || keysDown.has('ArrowUp')) move.add(forward);
  if (keysDown.has('s') || keysDown.has('S') || keysDown.has('ArrowDown')) move.sub(forward);
  if (keysDown.has('a') || keysDown.has('A') || keysDown.has('ArrowLeft')) move.sub(right);
  if (keysDown.has('d') || keysDown.has('D') || keysDown.has('ArrowRight')) move.add(right);
  if (keysDown.has('q') || keysDown.has('Q')) move.y += 1;
  if (keysDown.has('e') || keysDown.has('E')) move.y -= 1;
  if (move.lengthSq() === 0) return;
  move.normalize().multiplyScalar(speed);
  camera.position.add(move);
  controls.target.add(move);
}

// ═══════════════════════════════════════════

const visibleFilters = { unfinalized: true, finalized: true, extrinsic: true, cardano: true, empty: true };

function isBlockEmpty(entry) {
  const bd = blockList.find(b => b.nodeId === entry.id);
  return bd && !bd.hasLedgerTxs;
}

function getNodeFilter(entry) {
  if (entry.type === 'cardano') {
    // Hide Cardano nodes when all linked Midnight blocks are hidden
    if (!visibleFilters.empty) {
      const cb = cardanoBlocks.get(entry.cardanoHash);
      if (cb && ![...cb.referencedBy].some(num => {
        const bd = blockList.find(b => b.number === num);
        return bd && bd.hasLedgerTxs;
      })) return 'empty';
    }
    return 'cardano';
  }
  if (entry.type === 'extrinsic') {
    if (!visibleFilters.empty) {
      const parentBd = blockList.find(b => b.number === entry.blockNumber);
      if (parentBd && !parentBd.hasLedgerTxs) return 'empty';
    }
    return 'extrinsic';
  }
  if (entry.type === 'block') {
    if (!visibleFilters.empty && isBlockEmpty(entry)) return 'empty';
    const bd = blockList.find(b => b.nodeId === entry.id);
    return bd && bd.finalized ? 'finalized' : 'unfinalized';
  }
  return null;
}

function applyFilters() {
  for (const [id, entry] of nodeMap) {
    const filter = getNodeFilter(entry);
    const visible = filter ? visibleFilters[filter] : true;
    entry.mesh.visible = visible;
  }
  // Reposition visible blocks compactly, then rebuild edges
  repositionBlocks();
  repositionCardanoBlocks();
  rebuildAllEdges();
  forceSettleSteps = 150;
}

document.querySelectorAll('#legend input[data-filter]').forEach(cb => {
  cb.addEventListener('change', () => {
    visibleFilters[cb.dataset.filter] = cb.checked;
    applyFilters();
  });
});

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════

const clock = new THREE.Clock();
const dummy = new THREE.Object3D();
const _camQuat = new THREE.Quaternion();
const _parentQuat = new THREE.Quaternion();

function animate() {
  const t = clock.getElapsedTime();

  if (forceSettleSteps > 0) {
    forceStep();
    forceSettleSteps--;
  }

  for (const n of nodeMap.values()) {
    n.mesh.position.copy(n.pos);
    n.mesh.position.y += Math.sin(t * 0.5 + n.phase) * 0.1;
    n.mesh.rotation.y = t * 0.2 + n.phase;
    n.mesh.rotation.x = Math.sin(t * 0.3 + n.phase) * 0.1;
    n.glow.material.opacity = 0.5 + 0.15 * Math.sin(t * 1.5 + n.phase);
  }

  camera.getWorldQuaternion(_camQuat);
  for (const { label, mesh } of labelEntries) {
    mesh.getWorldQuaternion(_parentQuat).invert();
    label.quaternion.copy(_camQuat).premultiply(_parentQuat);
  }

  for (const e of edgeData) {
    const pa = e.geo.attributes.position.array;
    const sp = e.src.mesh.position, tp = e.tgt.mesh.position;
    pa[0] = sp.x; pa[1] = sp.y; pa[2] = sp.z;
    pa[3] = tp.x; pa[4] = tp.y; pa[5] = tp.z;
    e.geo.attributes.position.needsUpdate = true;
    e.line.material.opacity = 0.25 + 0.1 * Math.sin(t * 2 + e.phaseOffsets[0] * 10);
  }

  let idx = 0;
  const _a = new THREE.Vector3(), _b = new THREE.Vector3();
  for (const e of edgeData) {
    _a.copy(e.src.mesh.position);
    _b.copy(e.tgt.mesh.position);
    for (let p = 0; p < PARTICLES_PER_EDGE; p++) {
      if (idx >= MAX_PARTICLES) break;
      const phase = ((t * e.speed + e.phaseOffsets[p]) % 1 + 1) % 1;
      dummy.position.lerpVectors(_a, _b, phase);
      dummy.scale.setScalar(0.4 + 0.6 * Math.sin(phase * Math.PI));
      dummy.updateMatrix();
      particles.setMatrixAt(idx, dummy.matrix);
      idx++;
    }
  }
  particles.instanceMatrix.needsUpdate = true;

  stars1.rotation.y = t * 0.005;
  stars2.rotation.y = -t * 0.003;
  grid.position.z = (t * 0.5) % 1;

  if (!renderer.xr.isPresenting) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(nodeMeshes, false);
    if (hits.length > 0) {
      highlightNode(hits[0].object.userData.nodeId);
      document.body.style.cursor = 'pointer';
    } else {
      if (!selectedNode) highlightNode(null);
      document.body.style.cursor = 'default';
    }
    applyKeyboardMovement(1 / 60);
    controls.update();
    if (composer) composer.render(); else renderer.render(scene, camera);
  } else {
    const session = renderer.xr.getSession();
    const sources = session ? session.inputSources : [];
    const selectingSources = [];
    for (const src of sources) {
      if (src.gamepad && src.gamepad.buttons.length > 0 && src.gamepad.buttons[0].pressed) {
        selectingSources.push(src);
      }
    }
    const twoHands = selectingSources.length >= 2 ||
      (controller0.userData.selecting && controller1.userData.selecting);
    if (twoHands) {
      controller0.getWorldPosition(_c0Pos);
      controller1.getWorldPosition(_c1Pos);
      if (!pinchState.active) {
        pinchState.startDist = _c0Pos.distanceTo(_c1Pos);
        pinchState.startScale = graphGroup.scale.x;
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        pinchState.startMid.copy(_midPos);
        pinchState.startGroupPos.copy(graphGroup.position);
        pinchState.active = pinchState.startDist > 0.01;
      } else {
        const curDist = _c0Pos.distanceTo(_c1Pos);
        const scale = Math.min(Math.max(pinchState.startScale * (curDist / pinchState.startDist), 0.2), 5);
        graphGroup.scale.setScalar(scale);
        _midPos.lerpVectors(_c0Pos, _c1Pos, 0.5);
        graphGroup.position.copy(pinchState.startGroupPos).add(
          _midPos.clone().sub(pinchState.startMid)
        );
      }
    } else {
      pinchState.active = false;
    }

    const tempMatrix = new THREE.Matrix4();
    const rayDir = new THREE.Vector3(Math.sin(RAY_PITCH), 0, -Math.cos(RAY_PITCH));
    let bestHit = null;
    for (const ctrl of [controller0, controller1]) {
      tempMatrix.identity().extractRotation(ctrl.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
      raycaster.ray.direction.copy(rayDir).applyMatrix4(tempMatrix);
      const hits = raycaster.intersectObjects(nodeMeshes, false);
      if (hits.length > 0 && (!bestHit || hits[0].distance < bestHit.distance)) {
        bestHit = hits[0];
      }
    }
    if (bestHit) {
      highlightNode(bestHit.object.userData.nodeId);
    } else {
      if (!selectedNode) highlightNode(null);
    }
    if (vrInfoText.visible && selectedNode) {
      const sn = nodeMap.get(selectedNode);
      if (sn) {
        sn.mesh.getWorldPosition(vrInfoText.position);
        vrInfoText.position.x += sn.size * 0.5 + 0.4;
        vrInfoText.position.y += sn.size * 0.3;
        vrInfoText.quaternion.copy(camera.quaternion);
      }
    }
    renderer.render(scene, camera);
  }
}

renderer.setAnimationLoop(animate);

// ═══════════════════════════════════════════
// BACKWARD SCANNER — find historical blocks with ledger txs
// ═══════════════════════════════════════════

let scannerAbort = null;

// Batch-check up to 50 blocks in a single GraphQL request using aliases
async function batchCheckBlocks(heights) {
  const aliases = heights.map((h, i) =>
    `b${i}: block(offset: { height: ${h} }) { height transactions { __typename } }`
  );
  const resp = await fetch(INDEXER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: `{ ${aliases.join(' ')} }` }),
  });
  const json = await resp.json();
  if (json.errors) return [];
  const hits = [];
  for (const v of Object.values(json.data || {})) {
    if (v && v.transactions.some(t => t.__typename === 'RegularTransaction')) {
      hits.push(v.height);
    }
  }
  return hits;
}

async function scanBackward(startHeight) {
  const controller = new AbortController();
  scannerAbort = controller;
  const BATCH_SIZE = 50;  // blocks per GraphQL query
  const PARALLEL = 10;    // concurrent queries
  const stride = BATCH_SIZE * PARALLEL; // 500 blocks per round
  let totalFound = 0;

  const MAX_TX_BLOCKS = 100;
  console.log('Scanner: scanning backward from', startHeight, '(max', MAX_TX_BLOCKS, 'tx blocks)');

  for (let h = startHeight; h >= 1 && !controller.signal.aborted && totalFound < MAX_TX_BLOCKS; h -= stride) {
    // Build parallel batches covering [h-stride+1 .. h]
    const promises = [];
    for (let p = 0; p < PARALLEL; p++) {
      const batchStart = h - p * BATCH_SIZE;
      const heights = [];
      for (let i = 0; i < BATCH_SIZE; i++) {
        const bh = batchStart - i;
        if (bh >= 1) heights.push(bh);
      }
      if (heights.length > 0) {
        promises.push(batchCheckBlocks(heights).catch(() => []));
      }
    }
    const results = await Promise.all(promises);
    const roundHits = results.flat();

    // Fetch and add discovered blocks immediately (progressive display)
    for (const height of roundHits) {
      if (controller.signal.aborted) break;
      if (blockList.find(b => b.number === height)) {
        const bd = blockList.find(b => b.number === height);
        bd.hasLedgerTxs = true;
        continue;
      }
      try {
        const hash = await rpcCall('chain_getBlockHash', [height]);
        const block = await rpcCall('chain_getBlock', [hash]);
        addBlock(height, hash, block.block.extrinsics, block.block.header.digest.logs, true);
        totalFound++;
      } catch (e) {
        console.warn('Scanner: block', height, 'fetch failed:', e);
      }
    }
    if (roundHits.length > 0) applyFilters();
  }
  console.log('Scanner: complete, found', totalFound, 'blocks with ledger txs');
}

// ═══════════════════════════════════════════
// RPC CONNECTION
// ═══════════════════════════════════════════

function connectRpc() {
  const subtitle = document.getElementById('subtitle');
  subtitle.textContent = 'Connecting...';

  ws = new WebSocket(RPC_URL);
  ws.onopen = async () => {
    subtitle.textContent = 'Connected, subscribing...';
    try {
      chainName = await rpcCall('system_chain');

      // Fetch and parse runtime metadata for extrinsic type decoding
      try {
        const metaHex = await rpcCall('state_getMetadata');
        palletInfo = parseMetadata(metaHex);
      } catch (e) {
        console.warn('Metadata fetch failed:', e);
      }

      // Subscribe to new (unfinalized) heads
      await rpcCall('chain_subscribeNewHeads');

      // Subscribe to finalized heads
      await rpcCall('chain_subscribeFinalizedHeads');

      subtitle.textContent = chainName + ' // waiting for blocks...';

      // Start backward scan for historical blocks with ledger transactions
      rpcCall('chain_getHeader').then(header => {
        const headNumber = parseInt(header.number, 16);
        scanBackward(headNumber).catch(e => console.warn('Scanner error:', e));
      });
    } catch (e) {
      console.error('Setup error:', e);
      subtitle.textContent = 'Error: ' + e.message;
    }
  };

  ws.onmessage = async (evt) => {
    const msg = JSON.parse(evt.data);

    // RPC response
    if (msg.id != null && rpcCallbacks.has(msg.id)) {
      const cb = rpcCallbacks.get(msg.id);
      clearTimeout(cb.timer);
      rpcCallbacks.delete(msg.id);
      if (msg.error) cb.reject(msg.error);
      else cb.resolve(msg.result);
      return;
    }

    // Subscription notifications
    if (msg.params && msg.params.result) {
      const header = msg.params.result;
      const number = parseInt(header.number, 16);

      if (msg.method === 'chain_newHead') {
        try {
          const hash = await rpcCall('chain_getBlockHash', [number]);
          const block = await rpcCall('chain_getBlock', [hash]);
          addBlock(number, hash, block.block.extrinsics, block.block.header.digest.logs);
          updateSubtitle();
        } catch (e) {
          console.error('Failed to fetch block', number, e);
        }
      } else if (msg.method === 'chain_finalizedHead') {
        finalizeUpTo(number);
      }
    }
  };

  ws.onerror = () => {
    subtitle.textContent = 'Connection error, retrying...';
  };
  ws.onclose = () => {
    if (scannerAbort) scannerAbort.abort();
    setTimeout(connectRpc, 5000);
  };
}

connectRpc();
